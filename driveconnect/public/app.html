            </button>
            <div style="display:flex;justify-content:center;gap:16px;margin-top:12px">
                <button onclick="renderStep1()" style="background:none;border:none;color:#9CA3AF;font-size:13px;cursor:pointer;font-weight:600">← Changer le numéro</button>
                <button onclick="sendPhoneOTP(true)" style="background:none;border:none;color:#FF5A1F;font-size:13px;cursor:pointer;font-weight:700">Renvoyer le SMS</button>
            </div>
        </div>`;
        // Auto-focus et validation auto si 6 chiffres
        setTimeout(()=>{
            const inp = document.getElementById('otp-input');
            if (inp) {
                inp.focus();
                inp.addEventListener('input', ()=>{
                    if (inp.value.replace(/\D/g,'').length === 6) {
                        document.getElementById('verify-btn').click();
                    }
                });
            }
        }, 100);
    }

    // Expose pour les boutons inline
    window._phoneVerifStep1 = renderStep1;
    window._phoneVerifStep2 = renderStep2;
    window._phoneModal = modal;

    window.sendPhoneOTP = async function(resend) {
        const rawInput = document.getElementById('phone-input') ?
            document.getElementById('phone-input').value.replace(/\s/g,'') :
            existingPhone.replace('+687','').replace(/\s/g,'');
        const digits = rawInput.replace(/\D/g,'');
        const fullPhone = '+687' + digits;
        const errEl = document.getElementById('phone-error');

        if (digits.length < 6) {
            if (errEl) { errEl.style.display='block'; errEl.textContent='❌ Numéro invalide — 6 chiffres minimum'; }
            return;
        }

        const btn = document.getElementById('send-sms-btn');
        if (btn) { btn.textContent = '⏳ Envoi du SMS...'; btn.disabled = true; }

        try {
            // Envoi OTP via Supabase + Twilio
            const { error } = await sb.auth.signInWithOtp({
                phone: fullPhone,
                options: { shouldCreateUser: false }
            });

            if (error) {
                // Fallback si shouldCreateUser non supporté
                const { error: e2 } = await sb.auth.signInWithOtp({ phone: fullPhone });
                if (e2) {
                    if (errEl) { errEl.style.display='block'; errEl.textContent='❌ ' + (e2.message || 'Erreur envoi SMS'); }
                    if (btn) { btn.textContent = '📱 Envoyer le code SMS'; btn.disabled = false; }
                    return;
                }
            }
            renderStep2(fullPhone);
        } catch(e) {
            if (errEl) { errEl.style.display='block'; errEl.textContent='❌ Erreur réseau : ' + e.message; }
            if (btn) { btn.textContent = '📱 Envoyer le code SMS'; btn.disabled = false; }
        }
    };

    window.verifyPhoneOTP = async function(fullPhone) {
        const otp = (document.getElementById('otp-input').value || '').replace(/\D/g,'').trim();
        const errEl = document.getElementById('otp-error');
        if (otp.length !== 6) {
            if (errEl) { errEl.style.display='block'; errEl.textContent='❌ Le code doit contenir 6 chiffres'; }
            return;
        }

        const btn = document.getElementById('verify-btn');
        if (btn) { btn.textContent = '⏳ Vérification...'; btn.disabled = true; }

        try {
            // Vérifier le code OTP via Supabase
            const { data, error } = await sb.auth.verifyOtp({
                phone: fullPhone,
                token: otp,
                type: 'sms'
            });

            if (error) {
                if (errEl) { errEl.style.display='block'; errEl.textContent='❌ Code incorrect ou expiré — réessayez'; }
                if (btn) { btn.textContent = '✅ Confirmer'; btn.disabled = false; }
                const inp = document.getElementById('otp-input');
                if (inp) { inp.style.borderColor='#EF4444'; inp.style.background='#FEF2F2'; setTimeout(()=>{inp.style.borderColor='#E5E7EB';inp.style.background='#fff';},1500); }
                return;
            }

            // ✅ OTP validé — sauvegarder le numéro en base
            const isInst = currentUser.user_type === 'instructor';
            if (isInst) {
                await sb.from('instructors').update({ phone_number: fullPhone, phone_verified: true }).eq('id', currentUser.id);
                const idx = DB.instructors.findIndex(i=>i.id===currentUser.id);
                if (idx>=0) { DB.instructors[idx].phone_number = fullPhone; DB.instructors[idx].phone_verified = true; }
            }
            await sb.from('users').update({ phone_number: fullPhone, phone_verified: true }).eq('id', currentUser.id);
            currentUser.phone_number = fullPhone;
            currentUser.phone_verified = true;

            modal.remove();
            notif('✅ Numéro vérifié !', fullPhone + ' — confirmé par SMS', 'green');
            render();
        } catch(e) {
            if (errEl) { errEl.style.display='block'; errEl.textContent='❌ Erreur: ' + e.message; }
            if (btn) { btn.textContent = '✅ Confirmer'; btn.disabled = false; }
        }
    };

    renderStep1();
    document.body.appendChild(modal);
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });

    // Focus auto sur l'input téléphone
    setTimeout(()=>{ const inp = document.getElementById('phone-input'); if(inp) inp.focus(); }, 100);
};

window.sendForgotPasswordCode = async function(resend) {
    const errEl = document.getElementById('frg-error');
    const email = document.getElementById('frg-email')?.value?.trim().toLowerCase() || pwdResetState.email;
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        if (errEl) errEl.textContent = 'Saisissez un email valide.';
        return;
    }

    const now = Date.now();
    if (resend && pwdResetState.cooldownUntil > now) {
        const secs = Math.ceil((pwdResetState.cooldownUntil - now) / 1000);
        if (errEl) errEl.textContent = `Patientez ${secs}s avant de renvoyer un code.`;
        return;
    }

    pwdResetState.email = email;
    if (errEl) errEl.textContent = '';

    const resendBtn = document.getElementById('frg-resend-btn');
    if (resendBtn) {
        resendBtn.disabled = true;
        resendBtn.style.opacity = '0.6';
        resendBtn.textContent = 'Envoi...';
    }

    const { error } = await sb.auth.signInWithOtp({
        email,
        options: { shouldCreateUser: false }
    });

    if (resendBtn) {
        resendBtn.disabled = false;
        resendBtn.style.opacity = '1';
        resendBtn.textContent = 'Renvoyer';
    }

    if (error) {
        if (errEl) errEl.textContent = 'Erreur envoi code: ' + error.message;
        return;
    }

    pwdResetState.cooldownUntil = Date.now() + 30000;
    notif('📩 Code envoyé', `Vérifiez votre boite mail: ${email}`, 'green');
    const codeInput = document.getElementById('frg-code');
    if (codeInput) codeInput.focus();
};

window.submitForgotPasswordCode = async function() {
    const errEl = document.getElementById('frg-error');
    const email = document.getElementById('frg-email')?.value?.trim().toLowerCase() || pwdResetState.email;
    const code = (document.getElementById('frg-code')?.value || '').replace(/\s+/g, '').toUpperCase();
    const p1 = document.getElementById('frg-pass-1')?.value || '';
    const p2 = document.getElementById('frg-pass-2')?.value || '';

    if (errEl) errEl.textContent = '';
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { if (errEl) errEl.textContent = 'Email invalide.'; return; }
    if (code.length !== 6) { if (errEl) errEl.textContent = 'Entrez le code à 6 caractères.'; return; }
    if (p1.length < 6) { if (errEl) errEl.textContent = 'Mot de passe trop court (min 6 caractères).'; return; }
    if (p1 !== p2) { if (errEl) errEl.textContent = 'Les mots de passe ne correspondent pas.'; return; }

    const submitBtn = document.getElementById('frg-submit-btn');
    if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.style.opacity = '0.7';
        submitBtn.textContent = 'Vérification...';
    }

    const { error: otpErr } = await sb.auth.verifyOtp({
        email,
        token: code,
        type: 'email'
    });

    if (otpErr) {
        if (errEl) errEl.textContent = 'Code invalide ou expiré.';
        if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';
            submitBtn.textContent = 'Valider le code et changer';
        }
        return;
    }

    const { error: updateErr } = await sb.auth.updateUser({ password: p1 });
    if (updateErr) {
        if (errEl) errEl.textContent = 'Impossible de changer le mot de passe: ' + updateErr.message;
        if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';
            submitBtn.textContent = 'Valider le code et changer';
        }
        return;
    }

    await sb.auth.signOut();
    window.closeForgotPasswordModal();
    notif('✅ Mot de passe changé', 'Connectez-vous avec votre nouveau mot de passe', 'green');
    const emailInput = document.getElementById('email');
    if (emailInput) emailInput.value = email;
    const pwdInput = document.getElementById('password');
    if (pwdInput) pwdInput.focus();
};

let adminData = { users: [], instructors: [], bookings: [], slots: [] };

async function loadAdminData() {
    // Afficher un loading
    const app = document.getElementById('app');
    const existingContent = app?.innerHTML || '';
    const loadingOverlay = document.createElement('div');
    loadingOverlay.id = 'admin-loading';
    loadingOverlay.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;height:3px;background:linear-gradient(90deg,#FF5A1F,#FF7340,#FF5A1F);background-size:200%;animation:shimmer 1s infinite linear';
    document.body.appendChild(loadingOverlay);

    try {
    // Essayer RPC admin (bypass RLS) — timeout rapide si pas dispo
    let usersData = null;
    let bookingsData = null;

    const rpcResult = await sb.rpc('admin_get_all_users');
    if (!rpcResult.error && rpcResult.data) {
        usersData = rpcResult.data;
        console.log('[ADMIN] RPC OK:', usersData.length, 'users');
    } else {
        const u = await sb.from('users').select('*').order('created_at', { ascending: false });
        usersData = u.data || [];
    }

    const rpcBookings = await sb.rpc('admin_get_all_bookings');
    if (!rpcBookings.error && rpcBookings.data) {
        bookingsData = rpcBookings.data;
    } else {
        const b = await sb.from('bookings').select('*').order('created_at', { ascending: false });
        bookingsData = b.data || [];
    }

    const [i, s] = await Promise.all([
        sb.from('instructors').select('*').order('created_at', { ascending: false }),
        sb.from('slots').select('*').order('date', { ascending: false })
    ]);

    adminData.users        = usersData;
    adminData.instructors  = i.data || [];
    adminData.bookings     = bookingsData;
    adminData.slots        = s.data || [];
    adminData._rlsWarning  = usersData.length <= 1;

    if (app) app.innerHTML = AdminDashboard();
    if (adminTab === 'map') setTimeout(() => initMap(), 100);
    } finally {
        const lo = document.getElementById('admin-loading');
        if (lo) lo.remove();
    }
}
window.loadAdminData = loadAdminData;

// ========== ADMIN REALTIME — signalements en temps réel ==========
let _adminRealtimeChannel = null;
function setupAdminRealtime() {
    // Éviter les doublons si déjà actif
    if (_adminRealtimeChannel) return;

    _adminRealtimeChannel = sb.channel('admin-disputes')
        .on('postgres_changes', {
            event: 'UPDATE',
            schema: 'public',
            table: 'bookings',
            filter: 'status=eq.dispute'
        }, payload => {
            console.log('[ADMIN REALTIME] Nouveau signalement:', payload);
            // Mettre à jour adminData localement
            const idx = adminData.bookings.findIndex(b => b.id === payload.new.id);
            if (idx >= 0) adminData.bookings[idx] = { ...adminData.bookings[idx], ...payload.new };
            else adminData.bookings.unshift(payload.new);

            // Si l'admin est sur l'onglet signalements → re-render immédiat
            if (adminTab === 'signalements') {
                const app = document.getElementById('app');
                if (app) app.innerHTML = AdminDashboard();
            }
            // Sinon : juste une notif + badge rouge
            notif('🚨 Nouveau signalement', `${payload.new.dispute_by === 'student' ? 'Un élève' : 'Un moniteur'} vient de signaler un problème`, 'red');
            // Mettre à jour le badge sur l'onglet Signalements
            const badge = document.querySelector('[data-tab="signalements"]');
            if (badge) badge.innerHTML = '⚠️ Signalements 🔴';
        })
        .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'bookings'
        }, () => {
            // Nouvelle réservation → refresh silencieux
            loadAdminData();
        })
        .subscribe();
}

            byMonth[m].amount     += b.amount     || 0;
            byMonth[m].commission += b.commission || 0;
            byMonth[m].count++;

        // Top moniteurs
        const byInstructor = {};
        paid.forEach(b => {

// ── Helper : exécuter une action admin via RPC (bypass RLS) ──
async function adminExec(table, action, data, filterCol, filterVal) {
    // Tenter RPC générique admin
    const rpc = await sb.rpc('admin_exec', { 
        p_table: table, p_action: action, 
        p_data: JSON.stringify(data || {}), 
        p_filter_col: filterCol || 'id', 
        p_filter_val: filterVal || '' 
    });
    if (!rpc.error) return { success: true };
    // Fallback direct (marche si RLS le permet)
    console.warn('[ADMIN] RPC admin_exec failed, trying direct:', rpc.error.message);
    if (action === 'update') {
        const r = await sb.from(table).update(data).eq(filterCol || 'id', filterVal);
        return r.error ? { success: false, error: r.error.message } : { success: true };
    }
    if (action === 'delete') {
        const r = await sb.from(table).delete().eq(filterCol || 'id', filterVal);
        return r.error ? { success: false, error: r.error.message } : { success: true };
    }
    return { success: false, error: 'Unknown action' };
}

window.adminResetRevenueCounters = async () => {
    if (!confirm('⚠️ Remettre les compteurs revenus à 0 ?\n\nToutes les réservations payées seront marquées "archivées". Les revenus affichés repartiront de zéro. Irréversible.')) return;

    const btn = event && event.target ? event.target : null;
    if (btn) { btn.textContent = '⏳ Archivage...'; btn.disabled = true; }

    try {
        // Récupérer d'abord tous les IDs à archiver (évite le bug RLS sur update .eq sans .select)
        const { data: toArchive, error: fetchErr } = await sb
            .from('bookings')
            .select('id')
            .eq('payment_status', 'paid');

        if (fetchErr) throw new Error(fetchErr.message);
        if (!toArchive || toArchive.length === 0) {
            notif('ℹ️ Déjà à zéro', 'Aucune réservation payée à archiver', 'orange');
            if (btn) { btn.textContent = '🔄 Remettre les compteurs à 0'; btn.disabled = false; }
            return;
        }

        const ids = toArchive.map(r => r.id);

        // Mise à jour en un seul appel avec filtre IN (plus fiable que .eq sur tout)
        const { error: updateErr } = await sb
            .from('bookings')
            .update({ payment_status: 'archived' })
            .in('id', ids);

        if (updateErr) {
            // Fallback : mise à jour locale (affichage seul) si RLS bloque
            if (adminData && adminData.bookings) {
                adminData.bookings.forEach(b => {
                    if (ids.includes(b.id)) b.payment_status = 'archived';
                });
            }
            notif('⚠️ Remise à zéro locale uniquement', 'RLS Supabase bloque la mise à jour en base. Rafraîchissez la page pour vérifier. (' + ids.length + ' réservations concernées)', 'orange');
        } else {
            notif('✅ Compteurs remis à 0', ids.length + ' réservation(s) archivée(s) avec succès', 'green');
        }

        await loadAdminData();
    } catch(e) {
        notif('❌ Erreur', e.message, 'red');
    } finally {
        if (btn) { btn.textContent = '🔄 Remettre les compteurs à 0'; btn.disabled = false; }
    }
};

window.adminResetAllGPS = async () => {
    if (!confirm('Mettre TOUS les moniteurs hors ligne ?')) return;
    
    // Essayer RPC d'abord (bypass RLS)
    const rpc = await sb.rpc('admin_reset_all_gps');
    if (!rpc.error) {
        notif('📴 Tous les moniteurs mis hors ligne', '', 'orange');
        await loadAdminData();
        return;
    }
    
    // Fallback : mettre à jour chaque moniteur individuellement
    console.warn('[ADMIN] RPC admin_reset_all_gps failed, using fallback:', rpc.error.message);
    const promises = adminData.instructors.map(i => 
        sb.from('instructors').update({ is_online: false }).eq('id', i.id)
    );
    const results = await Promise.all(promises);
    const errors = results.filter(r => r.error);
    if (errors.length > 0) {
        console.warn('[ADMIN] Reset GPS errors:', errors.length, 'failed');

async function subscribeToPush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    try {
        const reg = await navigator.serviceWorker.ready;
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') return;
        const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: VAPID_PUBLIC });
        const { endpoint, keys } = sub.toJSON();
        await sb.from('push_subscriptions').upsert({ user_id: currentUser.id, endpoint, p256dh: keys.p256dh, auth: keys.auth }, { onConflict: 'user_id,endpoint' });
    } catch(e) { console.error('Push:', e); }
}

async function applyReferralCode(newUserId, referralCode) {
    // Le code de parrainage fonctionne pour tout inscrit (moniteur ou élève)
    if (!referralCode || referralCode.length !== 8) return;
    const code = referralCode.toUpperCase().trim();

    // Récupérer le moniteur parrain
    const { data: referrer } = await sb.from('instructors').select('id, name, referral_code, referral_count').eq('referral_code', code).single();
    if (!referrer) { notif('⚠️ Code invalide', 'Ce code de parrainage n\'existe pas', 'yellow'); return; }

    // Vérifier que le code n'est pas désactivé (max 10 parrainages aboutis)
    const currentCount = referrer.referral_count || 0;
    if (currentCount >= 10) {
        notif('⚠️ Code inactif', 'Ce code de parrainage a atteint son maximum de 10 utilisations et est désactivé.', 'yellow');
        return;
    }

    // Vérifier que cette personne n'a pas déjà utilisé un code (non cumulable)
    const { data: existingRef } = await sb.from('referrals').select('id').eq('referred_id', newUserId).maybeSingle();
    if (existingRef) { notif('⚠️ Déjà parrainé', 'Vous avez déjà utilisé un code de parrainage.', 'yellow'); return; }

    // Créer le parrainage — commission_discount = 1% par heure de conduite valide (1 seule fois)
    await sb.from('referrals').insert({
        referrer_id: referrer.id,
        referred_id: newUserId,
        referral_code: code,
        status: 'active',
        bonus_used: false,        // devient true après utilisation unique
        commission_discount: 1     // 1% de commission en moins sur 1 cours validé
    });

    // Incrémenter le compteur du parrain
    const newCount = currentCount + 1;
    const updates = { referral_count: newCount };
    // Si 10 parrainages atteints → désactiver le code
    if (newCount >= 10) {
        updates.referral_code_active = false;
    }
    await sb.from('instructors').update(updates).eq('id', referrer.id);

    sendPushToUser(referrer.id, '🎉 Nouveau filleul !', `Quelqu'un a rejoint DriveConnect avec votre code ! (${newCount}/10)`);
    notif('✅ Code appliqué !', `Parrain : ${referrer.name}. Bonus 1% sur votre 1er cours validé.`, 'green');
}

async function boot() {
    setupAppEnhancements();
    document.getElementById('app').innerHTML = `<div class="min-h-screen bg-gradient-to-br from-orange-50 to-white flex items-center justify-center">
        <div class="text-center" style="display:flex;flex-direction:column;align-items:center">
            ${renderBrandWordmark({ size:'lg', textColor:'#EA580C' })}
            <p class="text-gray-400 mt-2">Connexion à la base de données...</p>
            <div class="mt-4 w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
        </div>
    </div>`;
    try {
    const reachable = await checkSupabaseReachable();
    if (!reachable) {
        renderMaintenanceScreen();
        return;
    }

    const urlHash = window.location.hash;
    const urlParams = new URLSearchParams(window.location.search);
    const roleParam = urlParams.get('role');
    const adminKey  = urlParams.get('admin');

    // ── 1. RESET MOT DE PASSE ──────────────────────────────────────────────
    // Supabase envoie #access_token=...&type=recovery dans le hash après clic sur le lien mail
    const isRecovery = urlHash.includes('type=recovery');

    if (isRecovery) {
        // Laisser Supabase établir la session depuis les tokens du hash
        // On écoute PASSWORD_RECOVERY via onAuthStateChange
        await new Promise(resolve => {
            const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
                if (event === 'PASSWORD_RECOVERY') {
                    subscription.unsubscribe();
                    resolve();
                }
                // Timeout sécurité 4s
            });
            setTimeout(resolve, 4000);
        });
        // Nettoyer l'URL
        window.history.replaceState({}, document.title, window.location.pathname);
        // Afficher la modale de reset
        await loadData();
        render();
        setTimeout(() => showResetPasswordModal(), 200);
        return;
    }

    // ── 2. CONNEXION GOOGLE (OAuth callback) ──────────────────────────────
    const isOAuthCallback = urlHash.includes('access_token') && !isRecovery;
    const hasPendingGoogleType = !!localStorage.getItem('google_oauth_type');

    if (isOAuthCallback || hasPendingGoogleType) {
        // Récupérer la session (Supabase l'a déjà parsée depuis le hash)
        const { data: { session } } = await sb.auth.getSession();

        if (session && session.user?.app_metadata?.provider === 'google') {
            window.history.replaceState({}, document.title, window.location.pathname);
            await handleGoogleCallback(session);
            await loadData();
            render();
            return;
        }

        // Session pas encore dispo → attendre onAuthStateChange
        if (!session && isOAuthCallback) {
            await new Promise(resolve => {
                const { data: { subscription } } = sb.auth.onAuthStateChange(async (event, newSession) => {
                    if (newSession) {
                        subscription.unsubscribe();
                        window.history.replaceState({}, document.title, window.location.pathname);
                        await handleGoogleCallback(newSession);
                        await loadData();
                        render();
                        resolve();
                    }
                });
                setTimeout(resolve, 5000);
            });
            return;
        }
    }

    // ── 3. SESSION NORMALE (déjà connecté) ────────────────────────────────
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
        const userId = session.user.id;
        const meta = session.user.user_metadata || {};
        let { data: profile, error: profErr } = await sb.from('users').select('*').eq('id', userId).maybeSingle();
        
        // Si pas de profil, le créer depuis les métadonnées
        if (!profile) {
            console.log('[BOOT] No profile found, creating from metadata...');
            const savedType = meta.user_type || null;
            const { data: newProf } = await sb.from('users').upsert({
                id: userId,
                email: session.user.email,
                name: meta.name || session.user.email.split('@')[0],
                user_type: savedType
            }, { onConflict: 'id' }).select().single();
            profile = newProf;
            // Si toujours pas, attendre et réessayer
            if (!profile) {
                await new Promise(r => setTimeout(r, 1000));
                const retry = await sb.from('users').select('*').eq('id', userId).maybeSingle();
                profile = retry.data;
            }
        }
        
        // Si profil existe mais user_type null, corriger
        if (profile && !profile.user_type && meta.user_type) {
            await sb.from('users').update({ user_type: meta.user_type }).eq('id', userId);
            profile.user_type = meta.user_type;
        }

        if (profile) {
            currentUser = { ...profile, ...session.user, user_type: profile.user_type || meta.user_type };

            // Accès admin : soit is_admin en base, soit clé URL secrète
            if (profile.is_admin || adminKey === 'dc2024') {
                currentView = 'admin';
            } else if (currentUser.user_type === 'instructor') {
                const { data: instProfile } = await sb.from('instructors').select('approval_status').eq('id', userId).maybeSingle();
                const status = instProfile?.approval_status || 'pending_documents';
                if (status === 'approved') {
                    currentView = 'instructor-dashboard';
                } else if (status === 'pending_documents') {
                    currentView = 'instructor-upload-docs';
                } else if (status === 'rejected') {
                    currentView = 'instructor-rejected';
                } else {
                    currentView = 'instructor-pending';
                }
            } else {
                currentView = 'student-dashboard';
            }
        }
    } else if (roleParam === 'instructor') {
        currentView = 'instructor-login';
    } else if (roleParam === 'student') {
        currentView = 'student-login';
    }
    subscribeToPush();
    checkReferralInUrl();

    await loadData();
    initNoShowGuards(); // Neutralise immédiatement toutes les vieilles réservations
    render();

    // Charger les données de parrainage APRÈS render (les éléments DOM doivent exister)
    setTimeout(() => loadReferralData(), 300);

    // Refresh données sans re-render complet si sur carte
    setInterval(async () => {
        if (!document.hidden && currentView !== 'admin') {
            // Ne JAMAIS re-render les pages d'upload docs (détruit les inputs file)
            if (currentView === 'instructor-upload-docs' || currentView === 'instructor-rejected' || currentView === 'instructor-pending') return;

            try { await loadData(); } catch (_) { return; }
            if (currentUser) {
                // Si sur le dashboard étudiant avec carte visible, juste mettre à jour les markers
                if (currentView === 'student-dashboard' && map && iMarkers.length > 0) {
                    updateMapMarkers();
                } else {
                    render();
                }
            }
        }
    }, 10000); // 10s pour plus de réactivité
    } catch (e) {
        await logAppError('boot', e);
        renderMaintenanceScreen();
    }
}


window.submitRating = async function(bookingId, instructorId) {
    const rating = window._selectedRating || 0;
    if (!rating) { notif('❌ Choisissez une note', '', 'red'); return; }

    const { data: instructor } = await sb.from('instructors').select('rating,total_reviews').eq('id', instructorId).single();
    if (!instructor) { notif('❌ Erreur', '', 'red'); return; }

    const newTotal = (instructor.total_reviews || 0) + 1;
    const newRating = (((instructor.rating || 0) * (instructor.total_reviews || 0)) + rating) / newTotal;

    await sb.from('instructors').update({
        rating: Math.round(newRating * 10) / 10,
        total_reviews: newTotal
    }).eq('id', instructorId);

    await sb.from('bookings').update({ rated: true, rating_given: rating }).eq('id', bookingId);

    const modal = document.getElementById('rating-modal');
    if (modal) modal.remove();
    notif('⭐ Merci pour votre avis !', `Vous avez donné ${rating}/5 étoiles`, 'green');
    await loadData();
    render();
}

window._selectReportOption = function(optId) {
    window._reportSelectedOption = optId;
    document.querySelectorAll('#report-options button').forEach(b => {
        b.style.borderColor = b.dataset.opt === optId ? '#9333EA' : '#2A2A2A';
        b.style.background = b.dataset.opt === optId ? 'rgba(147,51,234,0.1)' : '#1A1A1A';
    });
    const btn = document.getElementById('report-submit-btn');
    if (btn) { btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; btn.disabled = false; }
};

window._submitReport = async function(bookingId, reporterType) {
    const reason = window._reportSelectedOption;
    const details = document.getElementById('report-details')?.value?.trim() || '';
    if (!reason) return;
    const btn = document.getElementById('report-submit-btn');
    if (btn) { btn.textContent = '⏳...'; btn.disabled = true; }

    const booking = DB.bookings.find(x => x.id === bookingId);

    // Mise à jour du booking → c'est ce que l'admin lit dans l'onglet Signalements
    const { error: updateError } = await sb.from('bookings').update({
        status: 'dispute',
        dispute_reason: reason,
        dispute_details: details,
        dispute_by: reporterType,
        dispute_at: new Date().toISOString()
    }).eq('id', bookingId);

    if (updateError) {
        notif('❌ Erreur', 'Impossible d\'envoyer le signalement : ' + updateError.message, 'red');
        if (btn) { btn.textContent = 'Envoyer'; btn.disabled = false; }
        return;
    }

    // Mise à jour locale immédiate pour que l'admin le voie sans recharger
    const localBooking = DB.bookings.find(x => x.id === bookingId);
    if (localBooking) {
        localBooking.status = 'dispute';
        localBooking.dispute_reason = reason;
        localBooking.dispute_details = details;
        localBooking.dispute_by = reporterType;
        localBooking.dispute_at = new Date().toISOString();
    }

    document.getElementById('report-modal')?.remove();
    notif('⚠️ Signalement envoyé', 'L\'administration traitera votre demande sous 24-48h', 'orange');
    await loadData(); render();
};

    textInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) _chatSendText(bookingId); });

    document.getElementById('chat-preview-cancel').addEventListener('click', _chatCancelPreview);
    document.getElementById('chat-preview-send').addEventListener('click', () => _chatSendImg(bookingId, fileInput));

    await _chatLoadMessages(bookingId);

    chatSubscription = sb.channel('chat-' + bookingId)
        .on('broadcast', { event: 'new_message' }, payload => {
            if (payload.payload && payload.payload.sender_id !== currentUser.id)
                _chatAppend(payload.payload);
        })
        .on('postgres_changes', {
            event: 'INSERT', schema: 'public', table: 'messages',
            filter: 'booking_id=eq.' + bookingId
        }, payload => {
            // Ignorer les messages qu'on a envoyé soi-même (évite le double affichage)
            if (payload.new.sender_id === currentUser.id) return;
            if (!document.querySelector('[data-msg-id="' + payload.new.id + '"]'))
                _chatAppend(payload.new);
        })
        .subscribe();
};

window.closeChat = function() {
    if (chatSubscription) { try { chatSubscription.unsubscribe(); } catch(e){} chatSubscription = null; }
    document.getElementById('chat-modal')?.remove();
    _chatBookingId = null;
};

// ── Helpers ──
function _esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function _phoneSVG() {
    return '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02L6.6 10.8z"/></svg>';
}

async function _chatSendText(bookingId) {
    const input = document.getElementById('chat-input');
    const text = input?.value?.trim();
    if (!text) return;
    // Empêcher double envoi rapide
    if (input._sending) return;
    input._sending = true;
    input.value = '';
    const tempId = 'local-' + Date.now() + '-' + Math.random().toString(36).substr(2,5);
    const msg = {
        id: tempId,
        booking_id: bookingId, sender_id: currentUser.id,
        sender_name: currentUser.name || 'Moi',
        content: sanitize(text), created_at: new Date().toISOString()
    };
    _chatAppend(msg);
    // Stocker l'ID temporaire pour ignorer le retour postgres_changes
    if (!window._chatSentLocalIds) window._chatSentLocalIds = new Set();
    window._chatSentLocalIds.add(text.trim());
    // Envoyer en broadcast (pour l'autre personne)
    try { sb.channel('chat-' + bookingId).send({ type:'broadcast', event:'new_message', payload: msg }); } catch(e){}
    const { error } = await sb.from('messages').insert({
        booking_id: bookingId, sender_id: currentUser.id,
        sender_name: currentUser.name || 'Moi', content: sanitize(text)
    });
    if (error) notif('❌ Erreur envoi', error.message, 'red');
    input._sending = false;
    // Nettoyer après 5s
    setTimeout(() => window._chatSentLocalIds?.delete(text.trim()), 5000);
}

function _chatPreviewImg(fileInput) {
    const file = fileInput?.files?.[0];
    if (!file) return;
    if (file.size > 20 * 1024 * 1024) { notif('❌ Image trop lourde', 'Max 20 Mo', 'red'); fileInput.value=''; return; }
    const reader = new FileReader();
    reader.onload = e => {
        const pz = document.getElementById('chat-img-preview');
        const pi = document.getElementById('chat-img-preview-img');
        const pn = document.getElementById('chat-img-preview-name');
        if (pz) pz.style.display = 'block';
        if (pi) pi.src = e.target.result;
        if (pn) pn.textContent = file.name + ' · ' + (file.size/1024).toFixed(0) + ' Ko';
        const inp = document.getElementById('chat-input');
        if (inp) inp.placeholder = 'Légende (optionnel)...';
    };
    reader.readAsDataURL(file);
}

function _chatCancelPreview() {
    const fi = document.getElementById('chat-img-input');
    if (fi) fi.value = '';
    const pz = document.getElementById('chat-img-preview');
    if (pz) pz.style.display = 'none';
    const inp = document.getElementById('chat-input');
    if (inp) inp.placeholder = 'Écrire un message...';
}

async function _chatSendImg(bookingId, fileInput) {
    const file = fileInput?.files?.[0];
    if (!file) { notif('❌ Aucune image', '', 'red'); return; }
    const btn = document.getElementById('chat-preview-send');
    if (btn) { btn.textContent = '⏳ Envoi...'; btn.disabled = true; }

    const caption = (document.getElementById('chat-input')?.value || '').trim();
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g,'');
    const path = bookingId + '/' + Date.now() + '_' + Math.random().toString(36).substr(2,6) + '.' + ext;

    // Créer un blob URL local pour affichage immédiat (pas de latence CDN)
    const localBlobUrl = URL.createObjectURL(file);

    // Afficher immédiatement avec l'image locale
    const content = caption || '📷 Photo';
    const localMsg = {
        booking_id: bookingId, sender_id: currentUser.id,
        sender_name: currentUser.name || 'Moi',
        content, image_url: localBlobUrl, created_at: new Date().toISOString()
    };
    _chatAppend(localMsg);
    _chatCancelPreview();
    if (document.getElementById('chat-input')) document.getElementById('chat-input').value = '';

    // Upload en arrière-plan
    const { error: upErr } = await sb.storage.from('chat-images').upload(path, file, { upsert:false, contentType:file.type });
    if (upErr) {
        notif('❌ Erreur upload', upErr.message, 'red');
        if (btn) { btn.textContent = '📤 Envoyer la photo'; btn.disabled = false; }
        return;
    }
    const { data: urlData } = sb.storage.from('chat-images').getPublicUrl(path);
    const imageUrl = urlData?.publicUrl;
    if (!imageUrl) { notif('❌ URL introuvable', '', 'red'); return; }

    // Envoyer le message avec l'URL permanente (pour l'autre personne)
    const remoteMsg = {
        booking_id: bookingId, sender_id: currentUser.id,
        sender_name: currentUser.name || 'Moi',
        content, image_url: imageUrl, created_at: new Date().toISOString()
    };
    try { sb.channel('chat-' + bookingId).send({ type:'broadcast', event:'new_message', payload: remoteMsg }); } catch(e){}
    await sb.from('messages').insert({
        booking_id: bookingId, sender_id: currentUser.id,
        sender_name: currentUser.name || 'Moi', content, image_url: imageUrl
    });
    notif('✅ Photo envoyée !', '', 'green');
}

async function _chatLoadMessages(bookingId) {
    const { data } = await sb.from('messages').select('*').eq('booking_id', bookingId).order('created_at', { ascending:true });
    const container = document.getElementById('chat-messages');
    if (!container) return;
    container.innerHTML = '';
    if (!data || data.length === 0) {
        const empty = document.createElement('p');
        empty.className = 'chat-empty';
        Object.assign(empty.style, { textAlign:'center', color:'#9CA3AF', fontSize:'14px', padding:'40px 20px', margin:'auto', lineHeight:'1.7' });
        empty.innerHTML = '💬 Aucun message<br><span style="font-size:12px;color:#D1D5DB">Commencez la conversation !</span>';
        container.appendChild(empty);
        return;
    }
    data.forEach(m => _chatAppend(m));
}

function _chatAppend(msg) {
    const container = document.getElementById('chat-messages');
    if (!container) return;
    container.querySelector('.chat-empty')?.remove();

    const isMe = msg.sender_id === currentUser.id;
    const time = new Date(msg.created_at).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });

    const wrapper = document.createElement('div');
    wrapper.dataset.msgId = msg.id || '';
    wrapper.style.cssText = 'display:flex;' + (isMe ? 'justify-content:flex-end' : 'justify-content:flex-start');

    const bubbleWrap = document.createElement('div');
    bubbleWrap.style.maxWidth = '75%';

    const radMe = '18px 18px 4px 18px';
    const radOther = '18px 18px 18px 4px';
    const bgMe = 'linear-gradient(135deg,#3B82F6,#2563EB)';

    if (msg.image_url) {
        const imgWrap = document.createElement('div');
        Object.assign(imgWrap.style, {
            borderRadius: isMe ? radMe : radOther,
            overflow:'hidden',
            background: isMe ? bgMe : '#fff',
            boxShadow: isMe ? '0 3px 14px rgba(59,130,246,0.35)' : '0 2px 8px rgba(0,0,0,0.1)',
            padding:'5px'
        });
        const img = document.createElement('img');
        img.src = msg.image_url;
        img.alt = 'Photo';
        Object.assign(img.style, {
            display:'block', width:'100%', maxWidth:'220px', maxHeight:'220px',
            objectFit:'cover', borderRadius:'12px', cursor:'pointer'
        });
        img.addEventListener('click', () => _chatFullImg(msg.image_url));
        // Retry loading au lieu de cacher l'image (CDN peut être lent)
        let retryCount = 0;
        img.addEventListener('error', () => {
            if (retryCount < 3) {
                retryCount++;
                setTimeout(() => { img.src = msg.image_url + (msg.image_url.includes('?') ? '&' : '?') + 'retry=' + retryCount; }, retryCount * 1500);
            } else {
                img.style.display = 'none';
                const fallback = document.createElement('p');
                fallback.textContent = '📷 Photo (chargement échoué)';
                fallback.style.cssText = 'color:#999;font-size:12px;padding:8px;text-align:center';
                imgWrap.appendChild(fallback);
            }
        });
        imgWrap.appendChild(img);
        if (msg.content && msg.content !== '📷 Photo') {
            const cap = document.createElement('p');
            cap.textContent = msg.content;
            Object.assign(cap.style, { margin:'5px 6px 2px', fontSize:'13px', color: isMe ? '#fff' : '#111' });
            imgWrap.appendChild(cap);
        }
        bubbleWrap.appendChild(imgWrap);
    } else {
        const bubble = document.createElement('div');
        Object.assign(bubble.style, {
            background: isMe ? bgMe : '#fff',
            color: isMe ? '#fff' : '#111',
            borderRadius: isMe ? radMe : radOther,
            padding:'10px 14px',
            boxShadow: isMe ? '0 3px 14px rgba(59,130,246,0.35)' : '0 2px 8px rgba(0,0,0,0.1)',
            wordBreak:'break-word', lineHeight:'1.5', fontSize:'14px'
        });
        bubble.textContent = msg.content || '';
        bubbleWrap.appendChild(bubble);
    }

    const meta = document.createElement('p');
    meta.textContent = (isMe ? 'Vous' : (msg.sender_name || 'Contact')) + ' · ' + time;
    Object.assign(meta.style, { fontSize:'10px', color:'#9CA3AF', margin:'3px 2px 0', textAlign: isMe ? 'right' : 'left' });
    bubbleWrap.appendChild(meta);
    wrapper.appendChild(bubbleWrap);
    container.appendChild(wrapper);
    container.scrollTop = container.scrollHeight;
}

function _chatFullImg(src) {
    const lb = document.createElement('div');
    lb.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:999999;display:flex;align-items:center;justify-content:center;cursor:pointer';
    lb.addEventListener('click', e => { if (e.target === lb) lb.remove(); });
    const img = document.createElement('img');
    img.src = src;
    img.style.cssText = 'max-width:95vw;max-height:88vh;border-radius:12px;object-fit:contain;cursor:default';
    img.addEventListener('click', e => e.stopPropagation());
    const closeBtn = document.createElement('button');
    closeBtn.innerHTML = '&times;';
    closeBtn.style.cssText = 'position:absolute;top:14px;right:14px;background:rgba(255,255,255,0.15);border:none;border-radius:50%;width:42px;height:42px;color:#fff;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center';
    closeBtn.addEventListener('click', () => lb.remove());
    const dl = document.createElement('a');
    dl.href = src; dl.download = 'photo.jpg'; dl.target = '_blank';
    dl.textContent = '⬇ Télécharger';
    dl.style.cssText = 'position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:#fff;color:#111;text-decoration:none;padding:10px 24px;border-radius:20px;font-weight:700;font-size:13px';
    lb.append(closeBtn, img, dl);
    document.body.appendChild(lb);
}

window.previewAvatar = function(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { notif('❌ Fichier trop lourd', 'Maximum 5MB', 'red'); return; }

    const reader = new FileReader();
    reader.onload = (e) => {
        const preview = document.getElementById('avatar-preview');
        if (preview) preview.innerHTML = '<img src="'+e.target.result+'" class="w-full h-full object-cover" alt="Preview">';
    };
    reader.readAsDataURL(file);

    // Upload immédiat
    uploadAvatar(file);
}

async function uploadAvatar(file) {
    const ext = file.name.split('.').pop();
    const path = currentUser.id + '/avatar.' + ext;

    notif('⏳ Upload en cours...', '', 'orange');

    const { data, error } = await sb.storage.from('avatars').upload(path, file, {
        upsert: true,
        contentType: file.type
    });

    if (error) { notif('❌ Erreur upload', error.message, 'red'); return; }

    const { data: urlData } = sb.storage.from('avatars').getPublicUrl(path);
    const avatarUrl = urlData.publicUrl + '?t=' + Date.now();

    await sb.from('instructors').update({ avatar_url: avatarUrl }).eq('id', currentUser.id);
    await sb.from('users').update({ avatar_url: avatarUrl }).eq('id', currentUser.id);

    currentUser.avatar_url = avatarUrl;
    notif('✅ Photo mise à jour !', 'Visible par tous les élèves', 'green');
    await loadData();
    render();
}

    avatarDiv.appendChild(img);

    const infoDiv = document.createElement('div');
    infoDiv.innerHTML = '<h2 style="font-size:20px;font-weight:700;color:white;margin-bottom:4px">' + inst.name + (inst.verified ? ' <span style="background:#DCFCE7;color:#16A34A;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600">✓ Vérifié</span>' : '') + '</h2>' +
        '<p style="color:rgba(255,255,255,0.5);font-size:13px">📍 ' + (inst.location || 'Nouméa') + '</p>' +
        '<p style="color:#F59E0B;font-size:14px;margin-top:4px">' + '★'.repeat(stars) + '☆'.repeat(5 - stars) + (inst.rating ? ' <span style="color:rgba(255,255,255,0.7)">' + inst.rating.toFixed(1) + '</span>' : '') + ' <span style="color:rgba(255,255,255,0.3);font-size:12px">(' + (inst.total_reviews || 0) + ' avis)</span></p>';

    const flexRow = document.createElement('div');
    flexRow.style.cssText = 'display:flex;align-items:center;gap:16px';
    flexRow.appendChild(avatarDiv);
    flexRow.appendChild(infoDiv);
    header.appendChild(closeBtn);
    header.appendChild(flexRow);

    // Stats bar
    const statsBar = document.createElement('div');
    statsBar.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 1fr;padding:20px;border-bottom:1px solid var(--border)';
    const statsData = [
        { val: (inst.hourly_rate || 0).toLocaleString(), label: 'XPF/heure' },
        { val: inst.experience || '—', label: 'ans exp.' },
        { val: slots.length, label: 'créneaux' }
    ];
    statsData.forEach((s, i) => {
        const cell = document.createElement('div');
        cell.style.cssText = 'text-align:center' + (i > 0 ? ';border-left:1px solid var(--border)' : '');
        cell.innerHTML = '<p style="font-size:22px;font-weight:700;color:' + (i === 0 ? 'var(--primary)' : 'var(--text)') + '">' + s.val + '</p><p style="font-size:12px;color:var(--text-muted);margin-top:4px">' + s.label + '</p>';
        statsBar.appendChild(cell);
    });

    // Statut en ligne
    const statusBar = document.createElement('div');
    statusBar.style.cssText = 'padding:12px 20px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)';
    statusBar.innerHTML = '<div style="width:10px;height:10px;border-radius:50%;background:' + (inst.is_online ? '#22C55E' : '#9CA3AF') + '"></div><p style="font-size:14px;font-weight:500;color:var(--text)">' + (inst.is_online ? 'En ligne maintenant' : 'Hors ligne') + '</p>';

    // Créneaux
    const slotsSection = document.createElement('div');
    slotsSection.style.cssText = 'padding:20px';
    const slotsTitle = document.createElement('h3');
    slotsTitle.style.cssText = 'font-weight:700;font-size:16px;color:var(--text);margin-bottom:16px';
    slotsTitle.textContent = 'Créneaux disponibles';
    slotsSection.appendChild(slotsTitle);

    if (slots.length === 0) {
        const empty = document.createElement('p');
        empty.style.cssText = 'text-align:center;color:var(--text-muted);font-size:14px;padding:32px 0';
        empty.textContent = 'Aucun créneau disponible pour le moment';
        slotsSection.appendChild(empty);
    } else {
        slots.forEach(s => {
            const slotCard = document.createElement('div');
            slotCard.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:16px;border-radius:16px;margin-bottom:8px;background:var(--bg);border:1px solid var(--border)';
            const slotInfo = document.createElement('div');
            slotInfo.innerHTML = '<p style="font-weight:600;font-size:14px;color:var(--text)">' + s.date + ' à ' + s.time + '</p><p style="font-size:12px;color:var(--text-muted);margin-top:2px">Durée : ' + s.duration + 'h</p>';
            const slotRight = document.createElement('div');
            slotRight.style.cssText = 'display:flex;align-items:center;gap:12px';
            const price = document.createElement('p');
            price.style.cssText = 'font-weight:700;color:var(--primary)';
            price.textContent = s.price.toLocaleString() + ' XPF';
            const bookBtn = document.createElement('button');
            bookBtn.className = 'btn-primary';
            bookBtn.style.cssText = 'padding:8px 16px;font-size:13px';
            bookBtn.textContent = 'Réserver';
            bookBtn.onclick = () => {
                overlay.remove();
                window.bookSlot(s.id, instructorId);
            };
            slotRight.appendChild(price);
            slotRight.appendChild(bookBtn);
            slotCard.appendChild(slotInfo);
            slotCard.appendChild(slotRight);
            slotsSection.appendChild(slotCard);
        });
    }

    panel.appendChild(header);
    panel.appendChild(statsBar);
    panel.appendChild(statusBar);
    panel.appendChild(slotsSection);
    overlay.appendChild(panel);
    document.body.appendChild(overlay);
}


boot();
</script>
</body>
</html>
