window.centerOnMe = () => {
    if (!map) return;
    map.setView([NOUMEA.lat, NOUMEA.lng], 13);
};

window.startTracking = () => {
    if (!navigator.geolocation) { notif('❌ GPS indisponible', 'Votre navigateur ne supporte pas le GPS', 'red'); return; }
    if (watchId) navigator.geolocation.clearWatch(watchId);

    const statusEl = document.getElementById('gps-status');
    if (statusEl) { statusEl.textContent = '⏳ Activation GPS...'; statusEl.style.color = '#F59E0B'; }

    notif('📡 GPS activé', 'Votre position est partagée en temps réel', 'green');
    // Mettre à jour visuellement les boutons GPS
    const gpsToggleBtn = document.getElementById('gps-toggle-btn');
    if (gpsToggleBtn) { gpsToggleBtn.textContent = '⏹ Arrêter'; gpsToggleBtn.style.background = '#EF4444'; }
    const gpsIcon = document.getElementById('gps-icon');
    if (gpsIcon) gpsIcon.textContent = '🟢';
    const gpsBtnLabel = document.getElementById('gps-btn-label');
    if (gpsBtnLabel) { gpsBtnLabel.textContent = 'GPS actif'; gpsBtnLabel.style.color = '#22C55E'; }

    watchId = navigator.geolocation.watchPosition(
        async pos => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const acc = Math.round(pos.coords.accuracy);
            const now = Date.now();

            // ── BROADCAST IMMÉDIAT (< 100ms de latence côté autres users) ──
            if (broadcastChannel) {
                broadcastChannel.send({
                    type: 'broadcast',
                    event: 'position',
                    payload: { id: currentUser.id, lat, lng }
                });
            }

            // ── Mise à jour carte locale instantanée ──
            if (map) {
                const icon = L.divIcon({
                    html: `<div style="position:relative">
                        <div style="position:absolute;inset:-6px;border-radius:50%;background:rgba(255,90,31,0.2);animation:pulse-ring 1.5s ease-out infinite"></div>
                        <div style="background:#FF5A1F;width:48px;height:48px;border-radius:50%;border:3px solid white;box-shadow:0 4px 20px rgba(255,90,31,0.5);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:white">🚗</div>
                    </div>`,
                    className: '', iconSize: [48, 48], iconAnchor: [24, 24]
                });
                if (userMarker) {
                    userMarker.setLatLng([lat, lng]);
                    userMarker.setIcon(icon);
                } else {
                    userMarker = L.marker([lat, lng], { icon }).addTo(map);
                    userMarker.bindPopup('<div style="text-align:center;padding:8px"><p style="font-weight:800">📍 Vous</p></div>');
                }
                // Suivre la position sans recentrer violemment (seulement si loin du centre)
                const currentCenter = map.getCenter();
                const dist = map.distance(currentCenter, L.latLng(lat, lng));
                if (dist > 500) map.panTo([lat, lng], { animate: true, duration: 0.8 });
            }

            // ── Mise à jour cache local ──
            const idx = DB.instructors.findIndex(i => i.id === currentUser.id);
            if (idx >= 0) { DB.instructors[idx].lat = lat; DB.instructors[idx].lng = lng; DB.instructors[idx].is_online = true; }

            // ── Mise à jour BDD (throttlée toutes les 2s pour réactivité maximale) ──
            if (now - lastDbUpdate > 2000) {
                lastDbUpdate = now;
                sb.from('instructors').update({ lat, lng, is_online: true }).eq('id', currentUser.id);
            }

            if (statusEl) {
                statusEl.innerHTML = `🟢 GPS actif &mdash; Précision : ${acc}m &mdash; ${fmtTimeNC(new Date())}`;
                statusEl.style.color = acc < 30 ? '#22C55E' : acc < 100 ? '#F59E0B' : '#EF4444';
            }
        },
        err => {
            const msg = err.code === 1 ? 'Permission refusée' : err.code === 2 ? 'Position indisponible' : 'Délai dépassé';
            if (statusEl) { statusEl.textContent = '❌ GPS erreur : ' + msg; statusEl.style.color = '#EF4444'; }
            notif('❌ GPS', msg, 'red');
        },
        {
            enableHighAccuracy: true,
            maximumAge: 0,        // Toujours position fraîche
            timeout: 5000         // 5s max pour réponse plus rapide
        }
    );
};

window.stopTracking = () => {
    if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    sb.from('instructors').update({ is_online: false }).eq('id', currentUser.id);
    const statusEl = document.getElementById('gps-status');
    if (statusEl) { statusEl.textContent = 'GPS arrêté'; statusEl.style.color = '#9CA3AF'; }
    const gpsToggleBtn = document.getElementById('gps-toggle-btn');
    if (gpsToggleBtn) { gpsToggleBtn.textContent = '▶ Activer'; gpsToggleBtn.style.background = '#FF5A1F'; }
    const gpsIcon = document.getElementById('gps-icon');
    if (gpsIcon) gpsIcon.textContent = '📍';
    const gpsBtnLabel = document.getElementById('gps-btn-label');
    if (gpsBtnLabel) { gpsBtnLabel.textContent = 'GPS'; gpsBtnLabel.style.color = ''; }
    notif('⚫ GPS arrêté', '', 'orange');
};

// ========== AUTO ONLINE / OFFLINE MONITEUR ==========
window.toggleOnline = async function() {
    if (!currentUser || currentUser.user_type !== 'instructor') return;
    const profile = DB.instructors.find(i => i.id === currentUser.id);
    const newState = !(profile?.is_online);
    await sb.from('instructors').update({ is_online: newState }).eq('id', currentUser.id);
    if (profile) profile.is_online = newState;
    if (newState) {
        notif('🟢 Vous êtes en ligne', 'Les élèves peuvent vous voir', 'green');
        window.startTracking();
    } else {
        notif('⚫ Hors ligne', 'Vous n\'apparaissez plus sur la carte', 'orange');
        window.stopTracking();
    }
    render();
};

window.toggleDriving = async function() {
    if (!currentUser || currentUser.user_type !== 'instructor') return;
    const profile = DB.instructors.find(i => i.id === currentUser.id);
    const isDriving = !(profile?.is_driving);
    await sb.from('instructors').update({
        is_driving: isDriving,
        driving_since: isDriving ? new Date().toISOString() : null,
        is_online: isDriving ? true : (profile?.is_online ?? false)
    }).eq('id', currentUser.id);
    if (profile) {
        profile.is_driving = isDriving;
        profile.driving_since = isDriving ? new Date().toISOString() : null;
        if (isDriving) profile.is_online = true;
    }
    if (isDriving) {
        notif('🚗 Cours démarré !', 'Notifications bloquées · Statut visible par vos élèves', 'orange');
        window._drivingModeActive = true;
        // Démarrer le GPS aussi
        window.startTracking();
    } else {
        window._drivingModeActive = false;
        notif('✅ Cours terminé !', 'Vous êtes de nouveau disponible', 'green');
    }
    render();
};

// Mettre automatiquement en ligne quand moniteur arrive sur le dashboard
async function _autoSetOnline() {
    if (!currentUser || currentUser.user_type !== 'instructor') return;
    await sb.from('instructors').update({ is_online: true }).eq('id', currentUser.id);
    const idx = DB.instructors.findIndex(i => i.id === currentUser.id);
    if (idx >= 0) DB.instructors[idx].is_online = true;
    console.log('[ONLINE] Moniteur mis en ligne automatiquement');
}

// Mettre automatiquement hors ligne quand moniteur quitte
async function _autoSetOffline() {
    if (!currentUser || currentUser.user_type !== 'instructor') return;
    // navigator.sendBeacon pour fiabilité (fonctionne même si la page se ferme)
    const url = sb.supabaseUrl + '/rest/v1/instructors?id=eq.' + currentUser.id;
    const headers = {
        'apikey': sb.supabaseKey,
        'Authorization': 'Bearer ' + (await sb.auth.getSession()).data?.session?.access_token,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
    };
    try {
        if (navigator.sendBeacon) {
            const blob = new Blob([JSON.stringify({ is_online: false })], { type: 'application/json' });
            // sendBeacon ne supporte pas les headers custom, fallback fetch
            fetch(url, { method: 'PATCH', headers, body: JSON.stringify({ is_online: false }), keepalive: true }).catch(() => {});
        } else {
            fetch(url, { method: 'PATCH', headers, body: JSON.stringify({ is_online: false }), keepalive: true }).catch(() => {});
        }
    } catch(e) {}
    // Aussi via Supabase client (backup)
    sb.from('instructors').update({ is_online: false }).eq('id', currentUser.id).then(() => {});
    if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    console.log('[OFFLINE] Moniteur mis hors ligne automatiquement');
}

// Listeners pour fermeture page / changement d'onglet
window.addEventListener('beforeunload', () => {
    if (currentUser?.user_type === 'instructor') _autoSetOffline();
});

document.addEventListener('visibilitychange', () => {
    if (!currentUser || currentUser.user_type !== 'instructor') return;
    if (document.visibilityState === 'hidden') {
        // Page masquée → hors ligne après 30s
        window._offlineTimer = setTimeout(() => _autoSetOffline(), 30000);
    } else {
        // Page visible → annuler le timer et remettre en ligne
        if (window._offlineTimer) { clearTimeout(window._offlineTimer); window._offlineTimer = null; }
        _autoSetOnline();
    }
});

            <div style="display:flex;justify-content:center;gap:16px;margin-top:12px">
                <button onclick="renderStep1()" style="background:none;border:none;color:#9CA3AF;font-size:13px;cursor:pointer;font-weight:600">← Changer le numéro</button>
                <button onclick="sendPhoneOTP(true)" style="background:none;border:none;color:#FF5A1F;font-size:13px;cursor:pointer;font-weight:700">Renvoyer le SMS</button>
            </div>
        </div>`;
        // Auto-focus et validation auto si 6 chiffres
        setTimeout(()=>{
            const inp = document.getElementById('otp-input');
            if (inp) {
                inp.focus();
                inp.addEventListener('input', ()=>{
                    if (inp.value.replace(/\D/g,'').length === 6) {
                        document.getElementById('verify-btn').click();
                    }
                });
            }
        }, 100);
    }

    // Expose pour les boutons inline
    window._phoneVerifStep1 = renderStep1;
    window._phoneVerifStep2 = renderStep2;
    window._phoneModal = modal;

    window.sendPhoneOTP = async function(resend) {
        const rawInput = document.getElementById('phone-input') ?
            document.getElementById('phone-input').value.replace(/\s/g,'') :
            existingPhone.replace('+687','').replace(/\s/g,'');
        const digits = rawInput.replace(/\D/g,'');
        const fullPhone = '+687' + digits;
        const errEl = document.getElementById('phone-error');

        if (digits.length < 6) {
            if (errEl) { errEl.style.display='block'; errEl.textContent='❌ Numéro invalide — 6 chiffres minimum'; }
            return;
        }

        const btn = document.getElementById('send-sms-btn');
        if (btn) { btn.textContent = '⏳ Envoi du SMS...'; btn.disabled = true; }

        try {
            // Envoi OTP via Supabase + Twilio
            const { error } = await sb.auth.signInWithOtp({
                phone: fullPhone,
                options: { shouldCreateUser: false }
            });

            if (error) {
                // Fallback si shouldCreateUser non supporté
                const { error: e2 } = await sb.auth.signInWithOtp({ phone: fullPhone });
                if (e2) {
                    if (errEl) { errEl.style.display='block'; errEl.textContent='❌ ' + (e2.message || 'Erreur envoi SMS'); }
                    if (btn) { btn.textContent = '📱 Envoyer le code SMS'; btn.disabled = false; }
                    return;
                }
            }
            renderStep2(fullPhone);
        } catch(e) {
            if (errEl) { errEl.style.display='block'; errEl.textContent='❌ Erreur réseau : ' + e.message; }
            if (btn) { btn.textContent = '📱 Envoyer le code SMS'; btn.disabled = false; }
        }
    };

    window.verifyPhoneOTP = async function(fullPhone) {
        const otp = (document.getElementById('otp-input').value || '').replace(/\D/g,'').trim();
        const errEl = document.getElementById('otp-error');
        if (otp.length !== 6) {
            if (errEl) { errEl.style.display='block'; errEl.textContent='❌ Le code doit contenir 6 chiffres'; }
            return;
        }

        const btn = document.getElementById('verify-btn');
        if (btn) { btn.textContent = '⏳ Vérification...'; btn.disabled = true; }

        try {
            // Vérifier le code OTP via Supabase
            const { data, error } = await sb.auth.verifyOtp({
                phone: fullPhone,
                token: otp,
                type: 'sms'
            });

            if (error) {
                if (errEl) { errEl.style.display='block'; errEl.textContent='❌ Code incorrect ou expiré — réessayez'; }
                if (btn) { btn.textContent = '✅ Confirmer'; btn.disabled = false; }
                const inp = document.getElementById('otp-input');
                if (inp) { inp.style.borderColor='#EF4444'; inp.style.background='#FEF2F2'; setTimeout(()=>{inp.style.borderColor='#E5E7EB';inp.style.background='#fff';},1500); }
                return;
            }

            // ✅ OTP validé — sauvegarder le numéro en base
            const isInst = currentUser.user_type === 'instructor';
            if (isInst) {
                await sb.from('instructors').update({ phone_number: fullPhone, phone_verified: true }).eq('id', currentUser.id);
                const idx = DB.instructors.findIndex(i=>i.id===currentUser.id);
                if (idx>=0) { DB.instructors[idx].phone_number = fullPhone; DB.instructors[idx].phone_verified = true; }
            }
            await sb.from('users').update({ phone_number: fullPhone, phone_verified: true }).eq('id', currentUser.id);
            currentUser.phone_number = fullPhone;
            currentUser.phone_verified = true;

            modal.remove();
            notif('✅ Numéro vérifié !', fullPhone + ' — confirmé par SMS', 'green');
            render();
        } catch(e) {
            if (errEl) { errEl.style.display='block'; errEl.textContent='❌ Erreur: ' + e.message; }
            if (btn) { btn.textContent = '✅ Confirmer'; btn.disabled = false; }
        }
    };

    renderStep1();
    document.body.appendChild(modal);
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });

    // Focus auto sur l'input téléphone
    setTimeout(()=>{ const inp = document.getElementById('phone-input'); if(inp) inp.focus(); }, 100);
};

window.sendForgotPasswordCode = async function(resend) {
    const errEl = document.getElementById('frg-error');
    const email = document.getElementById('frg-email')?.value?.trim().toLowerCase() || pwdResetState.email;
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        if (errEl) errEl.textContent = 'Saisissez un email valide.';
        return;
    }

    const now = Date.now();
    if (resend && pwdResetState.cooldownUntil > now) {
        const secs = Math.ceil((pwdResetState.cooldownUntil - now) / 1000);
        if (errEl) errEl.textContent = `Patientez ${secs}s avant de renvoyer un code.`;
        return;
    }

    pwdResetState.email = email;
    if (errEl) errEl.textContent = '';

    const resendBtn = document.getElementById('frg-resend-btn');
    if (resendBtn) {
        resendBtn.disabled = true;
        resendBtn.style.opacity = '0.6';
        resendBtn.textContent = 'Envoi...';
    }

    const { error } = await sb.auth.signInWithOtp({
        email,
        options: { shouldCreateUser: false }
    });

    if (resendBtn) {
        resendBtn.disabled = false;
        resendBtn.style.opacity = '1';
        resendBtn.textContent = 'Renvoyer';
    }

    if (error) {
        if (errEl) errEl.textContent = 'Erreur envoi code: ' + error.message;
        return;
    }

    pwdResetState.cooldownUntil = Date.now() + 30000;
    notif('📩 Code envoyé', `Vérifiez votre boite mail: ${email}`, 'green');
    const codeInput = document.getElementById('frg-code');
    if (codeInput) codeInput.focus();
};

window.submitForgotPasswordCode = async function() {
    const errEl = document.getElementById('frg-error');
    const email = document.getElementById('frg-email')?.value?.trim().toLowerCase() || pwdResetState.email;
    const code = (document.getElementById('frg-code')?.value || '').replace(/\s+/g, '').toUpperCase();
    const p1 = document.getElementById('frg-pass-1')?.value || '';
    const p2 = document.getElementById('frg-pass-2')?.value || '';

    if (errEl) errEl.textContent = '';
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { if (errEl) errEl.textContent = 'Email invalide.'; return; }
    if (code.length !== 6) { if (errEl) errEl.textContent = 'Entrez le code à 6 caractères.'; return; }
    if (p1.length < 6) { if (errEl) errEl.textContent = 'Mot de passe trop court (min 6 caractères).'; return; }
    if (p1 !== p2) { if (errEl) errEl.textContent = 'Les mots de passe ne correspondent pas.'; return; }

    const submitBtn = document.getElementById('frg-submit-btn');
    if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.style.opacity = '0.7';
        submitBtn.textContent = 'Vérification...';
    }

    const { error: otpErr } = await sb.auth.verifyOtp({
        email,
        token: code,
        type: 'email'
    });

    if (otpErr) {
        if (errEl) errEl.textContent = 'Code invalide ou expiré.';
        if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';
            submitBtn.textContent = 'Valider le code et changer';
        }
        return;
    }

    const { error: updateErr } = await sb.auth.updateUser({ password: p1 });
    if (updateErr) {
        if (errEl) errEl.textContent = 'Impossible de changer le mot de passe: ' + updateErr.message;
        if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';
            submitBtn.textContent = 'Valider le code et changer';
        }
        return;
    }

    await sb.auth.signOut();
    window.closeForgotPasswordModal();
    notif('✅ Mot de passe changé', 'Connectez-vous avec votre nouveau mot de passe', 'green');
    const emailInput = document.getElementById('email');
    if (emailInput) emailInput.value = email;
    const pwdInput = document.getElementById('password');
    if (pwdInput) pwdInput.focus();
};

async function loadAdminData() {

    document.body.appendChild(loadingOverlay);

    try {
    // Essayer RPC admin (bypass RLS) — timeout rapide si pas dispo
    let usersData = null;
    let bookingsData = null;

    const rpcResult = await sb.rpc('admin_get_all_users');
    if (!rpcResult.error && rpcResult.data) {
        usersData = rpcResult.data;
        console.log('[ADMIN] RPC OK:', usersData.length, 'users');
    } else {
        const u = await sb.from('users').select('*').order('created_at', { ascending: false });

    }

    const rpcBookings = await sb.rpc('admin_get_all_bookings');

        bookingsData = rpcBookings.data;
    } else {
        const b = await sb.from('bookings').select('*').order('created_at', { ascending: false });
        bookingsData = b.data || [];
    }

    const [i, s] = await Promise.all([
        sb.from('instructors').select('*').order('created_at', { ascending: false }),
        sb.from('slots').select('*').order('date', { ascending: false })
    ]);

    adminData.users        = usersData;
    adminData.instructors  = i.data || [];
    adminData.bookings     = bookingsData;
    adminData.slots        = s.data || [];
    adminData._rlsWarning  = usersData.length <= 1;

        if (lo) lo.remove();
    }
}

// ========== ADMIN REALTIME — signalements en temps réel ==========
let _adminRealtimeChannel = null;
function setupAdminRealtime() {
    // Éviter les doublons si déjà actif
    if (_adminRealtimeChannel) return;

    _adminRealtimeChannel = sb.channel('admin-disputes')
        .on('postgres_changes', {
            event: 'UPDATE',
            schema: 'public',
            table: 'bookings',
            filter: 'status=eq.dispute'
        }, payload => {
            console.log('[ADMIN REALTIME] Nouveau signalement:', payload);
            // Mettre à jour adminData localement
            const idx = adminData.bookings.findIndex(b => b.id === payload.new.id);
            if (idx >= 0) adminData.bookings[idx] = { ...adminData.bookings[idx], ...payload.new };
            else adminData.bookings.unshift(payload.new);

            // Si l'admin est sur l'onglet signalements → re-render immédiat
            if (adminTab === 'signalements') {
                const app = document.getElementById('app');
                if (app) app.innerHTML = AdminDashboard();
            }
            // Sinon : juste une notif + badge rouge
            notif('🚨 Nouveau signalement', `${payload.new.dispute_by === 'student' ? 'Un élève' : 'Un moniteur'} vient de signaler un problème`, 'red');
            // Mettre à jour le badge sur l'onglet Signalements
            const badge = document.querySelector('[data-tab="signalements"]');
            if (badge) badge.innerHTML = '⚠️ Signalements 🔴';
        })
        .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'bookings'
        }, () => {
            // Nouvelle réservation → refresh silencieux
            loadAdminData();
        })
        .subscribe();
}

function getAdminTabContent(tab, stats) {
    const now = new Date();

    // ── VUE D'ENSEMBLE ──────────────────────────────────────────────────────
    if (tab === 'overview') {
        const paid = adminData.bookings.filter(b => b.status === 'confirmed' && b.payment_status === 'paid');
        const totalRev = paid.reduce((s,b) => s+(b.amount||0), 0);
        const totalCom = paid.reduce((s,b) => s+(b.commission||0), 0);

        // Revenus par mois (6 derniers)
        const byMonth = {};
        paid.forEach(b => {
            const m = (b.date||'').substring(0,7);
            if (!byMonth[m]) byMonth[m] = { rev:0, count:0 };
            byMonth[m].rev += b.amount||0;
            byMonth[m].count++;
        });
        const months6 = Object.entries(byMonth).sort((a,b)=>a[0].localeCompare(b[0])).slice(-6);
        const maxRev = Math.max(...months6.map(([,v])=>v.rev), 1);

        // Réservations par jour (7 derniers jours)
        const byDay = {};
        for (let i=6; i>=0; i--) {
            const d = new Date(Date.now()-i*86400000).toISOString().split('T')[0];
            byDay[d] = 0;
        }
        adminData.bookings.forEach(b => { if (byDay[b.date]!==undefined) byDay[b.date]++; });
        const days7 = Object.entries(byDay);
        const maxDay = Math.max(...days7.map(([,v])=>v), 1);

        // Activité récente
        const recent = [...adminData.bookings]
            .filter(b => b.created_at)
            .sort((a,b) => new Date(b.created_at)-new Date(a.created_at))
            .slice(0,8);

        // Taux conversion
        const convRate = adminData.bookings.length > 0 ? Math.round(paid.length/adminData.bookings.length*100) : 0;
        const cancelRate = adminData.bookings.length > 0 ? Math.round(adminData.bookings.filter(b=>b.status==='cancelled').length/adminData.bookings.length*100) : 0;

                        <span style="font-size:10px;color:#6B7280">Plus</span>
                    </div>
                </div>`;
            })()}

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

                <!-- Activité récente -->
                <div style="background:#111;border:1px solid #1F1F1F;border-radius:20px;padding:22px">
                    <p style="font-weight:800;font-size:15px;margin:0 0 16px">⚡ Activité récente</p>
                    ${recent.length === 0 ? '<p style="color:#4B5563;text-align:center;padding:20px">Aucune activité</p>' :

                        const ago = b.created_at ? Math.round((Date.now()-new Date(b.created_at))/60000) : 0;

    // ── APPROBATIONS ──────────────────────────────────────────────────────
    if (tab === 'approvals') {

            <div style="background:#111;border:1px solid #1F1F1F;border-radius:18px;padding:18px;text-align:center">

            const user = adminData.users.find(u => u.id === inst.id || u.id === inst.user_id);
            return `<div style="background:#111;border:1px solid #1F1F1F;border-radius:20px;padding:24px">
                <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:16px">
                    <div>
                        <p style="font-weight:900;font-size:18px;color:#fff">${inst.name||'?'}</p>
                        <p style="font-size:13px;color:#6B7280">${user?.email||inst.email||'?'}</p>
                        <p style="font-size:11px;color:#4B5563;margin-top:4px">Inscrit le ${user?.created_at ? new Date(user.created_at).toLocaleDateString('fr-FR',{timeZone:NC_TZ}) : '?'}</p>
                    </div>
                    <span style="background:rgba(251,191,36,0.15);color:#FBBF24;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700">⏳ En attente</span>
                </div>
                <div style="margin-bottom:16px">
                    <p style="font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Documents fournis (${docs.length})</p>

                    ${docs.map(d => `<div style="display:flex;align-items:center;gap:12px;background:#1A1A1A;border-radius:14px;padding:12px 16px">
                        <span style="font-size:20px">${d.doc_type==='autorisation'?'🪪':d.doc_type==='identite'?'🆔':'🛡️'}</span>
                        <div style="flex:1">
                            <p style="font-size:13px;font-weight:700;color:#fff">${d.doc_type==='autorisation'?'Autorisation d&#39;enseigner':d.doc_type==='identite'?'Pièce d&#39;identit\u00e9':'Assurance pro'}</p>
                            <p style="font-size:11px;color:#4B5563">${d.filename||'document'}</p>
                        </div>
                        <a href="${d.url}" target="_blank" style="background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.3);color:#60A5FA;padding:6px 14px;border-radius:10px;font-size:12px;font-weight:700;text-decoration:none">👁️ Voir</a>
                    </div>`).join('')}
                    ${docs.length === 0 ? '<p style="color:#4B5563;font-style:italic">Aucun document</p>' : ''}
                    </div>
                </div>
                <div style="display:flex;gap:12px">
                    <button onclick="adminApproveInstructor('${inst.id}')" style="flex:1;padding:14px;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#22C55E;border-radius:14px;font-weight:800;font-size:14px;cursor:pointer">✅ Accepter</button>
                    <button onclick="adminRejectInstructorModal('${inst.id}','${(inst.name||'').replace(/'/g,'')}')" style="flex:1;padding:14px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#EF4444;border-radius:14px;font-weight:800;font-size:14px;cursor:pointer">❌ Refuser</button>

        ${rejectedInstructors.length > 0 ? `
        <div style="margin-top:32px">
            <p style="font-weight:800;font-size:15px;color:#EF4444;margin-bottom:12px">Derniers refusés</p>
            <div style="display:flex;flex-direction:column;gap:8px">
            ${rejectedInstructors.slice(0,5).map(inst => `
            <div style="background:#111;border:1px solid #1F1F1F;border-radius:14px;padding:14px;display:flex;justify-content:space-between;align-items:center">

                    <p style="font-weight:700;font-size:13px;color:#fff">${inst.name||'?'}</p>

                <span style="background:rgba(239,68,68,0.1);color:#EF4444;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700">Refusé</span>

    // ── VUE D'ENSEMBLE ──────────────────────────────────────────────────────
    if (tab === 'overview') {
        const recent = adminData.bookings.slice(0, 8);
        const alerts = [];

        adminData.instructors.filter(i => !i.verified).forEach(i => alerts.push({ type: 'info', msg: `Moniteur ${i.name||'?'} non vérifié — en attente de validation` }));

            <div style="background:${a.type==='danger'?'rgba(239,68,68,0.08)':a.type==='warn'?'rgba(251,191,36,0.08)':'rgba(96,165,250,0.08)'};border:1px solid ${a.type==='danger'?'rgba(239,68,68,0.2)':a.type==='warn'?'rgba(251,191,36,0.2)':'rgba(96,165,250,0.2)'};border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px">

                    </div>
                    <span style="padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;
                        background:${b.status==='confirmed'?'rgba(52,211,153,0.1)':b.status==='cancelled'?'rgba(239,68,68,0.1)':'rgba(251,191,36,0.1)'};
                        color:${b.status==='confirmed'?'#34D399':b.status==='cancelled'?'#EF4444':'#FBBF24'}">
                        ${b.status==='confirmed'?'✅ Confirmé':b.status==='cancelled'?'❌ Annulé':'⏳ En attente'}
                    </span>
                </div>`).join('')}
                </div>
            </div>

            <!-- Moniteurs actifs + Stats -->
            <div style="display:flex;flex-direction:column;gap:16px">
                <div style="background:#111;border:1px solid #1F1F1F;border-radius:20px;padding:20px">
                    <p style="font-weight:800;font-size:15px;margin-bottom:16px">🚗 Moniteurs en ligne maintenant</p>
                    ${adminData.instructors.filter(i => i.is_online).length === 0 ?
                    '<p style="color:#4B5563;text-align:center;padding:16px">Aucun moniteur en ligne</p>' :
                    adminData.instructors.filter(i => i.is_online).map(i => `
                    <div style="display:flex;align-items:center;gap:10px;padding:10px;background:#1A1A1A;border-radius:12px;margin-bottom:8px">
                        <div style="width:36px;height:36px;border-radius:10px;background:#FF5A1F;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0">
                            ${i.avatar_url?`<img src="${i.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit">`:`<img src="${DEFAULT_AVATAR}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit">`}
                        </div>
                        <div style="flex:1">
                            <p style="font-weight:700;font-size:13px">${i.name||'?'}</p>
                            <p style="font-size:11px;color:#6B7280">📍 ${i.location||'?'} · ⭐ ${i.rating||0}</p>
                        </div>
                        <div style="width:8px;height:8px;border-radius:50%;background:#22C55E"></div>
                    </div>`).join('')}
                </div>

                <div style="background:#111;border:1px solid #1F1F1F;border-radius:20px;padding:20px">
                    <p style="font-weight:800;font-size:15px;margin-bottom:16px">📊 Statuts réservations</p>
                    ${[
                        { label: 'Confirmées', val: stats.confirmedBook, color: '#34D399', pct: Math.round(stats.confirmedBook / Math.max(adminData.bookings.length,1) * 100) },
                        { label: 'En attente', val: stats.pendingBook,   color: '#FBBF24', pct: Math.round(stats.pendingBook / Math.max(adminData.bookings.length,1) * 100) },
                        { label: 'Annulées',   val: stats.cancelledBook, color: '#EF4444', pct: Math.round(stats.cancelledBook / Math.max(adminData.bookings.length,1) * 100) },
                    ].map(s => `
                    <div style="margin-bottom:12px">
                        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                            <span style="font-size:12px;color:#9CA3AF">${s.label}</span>
                            <span style="font-size:12px;font-weight:700;color:${s.color}">${s.val} (${s.pct}%)</span>
                        </div>
                        <div style="background:#1F1F1F;border-radius:4px;height:6px">
                            <div style="background:${s.color};height:6px;border-radius:4px;width:${s.pct}%;transition:width 0.5s"></div>
                        </div>
                    </div>`).join('')}
                </div>
            </div>
        </div>`;
    }

    // ── RÉSERVATIONS ────────────────────────────────────────────────────────
    if (tab === 'bookings') {
        const pending   = adminData.bookings.filter(b => b.status === 'pending');
        const confirmed = adminData.bookings.filter(b => b.status === 'confirmed');
        const cancelled = adminData.bookings.filter(b => b.status === 'cancelled');

        const bookingRow = (b, showActions) => `
        <div style="background:#1A1A1A;border-radius:14px;padding:16px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
            <div style="flex:1;min-width:0">

                    <span style="color:#6B7280;font-size:12px">→</span>
                    <p style="font-weight:700;font-size:14px;color:#FF5A1F">${b.instructor_name||'?'}</p>
                </div>
                <p style="font-size:12px;color:#6B7280">📅 ${b.date} à ${b.time||'?'} · ⏱️ ${b.duration||1}h · 💰 ${(b.amount||0).toLocaleString()} XPF</p>

                ` : ''}
            </div>
        </div>`;

        return `
        <div style="display:flex;flex-direction:column;gap:24px">
            ${pending.length > 0 ? `
            <div>
                <p style="font-weight:800;font-size:16px;color:#FBBF24;margin-bottom:12px">⏳ En attente (${pending.length})</p>
                <div style="display:flex;flex-direction:column;gap:8px">${pending.map(b => bookingRow(b, true)).join('')}</div>

            <div>
                <p style="font-weight:800;font-size:16px;color:#34D399;margin-bottom:12px">✅ Confirmées (${confirmed.length})</p>

        </div>`;

    // ── ÉLÈVES ──────────────────────────────────────────────────────────────
    if (tab === 'students') {
        const students = adminData.users.filter(u => u.user_type === 'student');
        return `
        <div>
            ${adminData._rlsWarning ? `
            <div style="background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.25);border-radius:14px;padding:16px;margin-bottom:16px">
                <p style="color:#FBBF24;font-weight:800;font-size:14px;margin-bottom:6px">⚠️ Accès limité — Élèves non visibles</p>
                <p style="color:#9CA3AF;font-size:12px;line-height:1.6;margin-bottom:10px">Les politiques RLS de Supabase bloquent l'accès aux données des autres utilisateurs. Copiez et exécutez ce SQL dans <strong style="color:#fff">Supabase → SQL Editor</strong> :</p>
                <div style="background:#111;border-radius:10px;padding:12px;font-family:monospace;font-size:11px;color:#A5B4FC;word-break:break-all;line-height:1.6;white-space:pre-wrap;max-height:200px;overflow-y:auto">-- Fonction admin pour voir tous les users
CREATE OR REPLACE FUNCTION admin_get_all_users()
RETURNS SETOF users LANGUAGE sql SECURITY DEFINER AS $$
  SELECT * FROM users ORDER BY created_at DESC;
$$;

-- Fonction admin pour voir toutes les réservations
CREATE OR REPLACE FUNCTION admin_get_all_bookings()
RETURNS SETOF bookings LANGUAGE sql SECURITY DEFINER AS $$
  SELECT * FROM bookings ORDER BY created_at DESC;
$$;

-- Fonction admin pour reset GPS
CREATE OR REPLACE FUNCTION admin_reset_all_gps()
RETURNS void LANGUAGE sql SECURITY DEFINER AS $$
  UPDATE instructors SET is_online = false;
$$;

-- Accorder les droits
GRANT EXECUTE ON FUNCTION admin_get_all_users TO authenticated;
GRANT EXECUTE ON FUNCTION admin_get_all_bookings TO authenticated;
GRANT EXECUTE ON FUNCTION admin_reset_all_gps TO authenticated;</div>
                <button onclick="navigator.clipboard.writeText(document.querySelector('[style*=pre-wrap]').textContent);this.textContent='✅ Copié !';setTimeout(()=>this.textContent='📋 Copier le SQL',2000)" style="margin-top:10px;padding:8px 14px;background:rgba(251,191,36,0.15);border:1px solid rgba(251,191,36,0.3);color:#FBBF24;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer">📋 Copier le SQL</button>
            </div>` : ''}
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                <p style="font-weight:800;font-size:16px">${students.length} élève${students.length>1?'s':''} inscrits</p>

                    <button onclick="this.textContent='⏳...';this.disabled=true;loadAdminData()" style="padding:8px 14px;background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.2);color:#60A5FA;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer">🔄 Actualiser</button>
                    <input id="search-students" oninput="adminFilter('students')" placeholder="🔍 Rechercher..." 
                        style="background:#1A1A1A;border:1px solid #2A2A2A;border-radius:10px;padding:8px 14px;color:#fff;font-size:13px;outline:none">
                </div>
            </div>
            <div id="students-list" style="display:flex;flex-direction:column;gap:8px">
            ${students.map(u => {
                const myBookings = adminData.bookings.filter(b => b.student_id === u.id);
                const spent = myBookings.filter(b => b.payment_status === 'paid').reduce((s,b) => s+(b.amount||0), 0);
                return `
                <div style="background:#1A1A1A;border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px">
                    <div style="width:44px;height:44px;border-radius:12px;background:#1D4ED8;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;flex-shrink:0;color:#fff;overflow:hidden">
                        ${u.avatar_url?`<img src="${u.avatar_url}" style="width:100%;height:100%;object-fit:cover">`:`<img src="${DEFAULT_AVATAR}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit">`}
                    </div>
                    <div style="flex:1;min-width:0">
                        <p style="font-weight:800;font-size:14px">${u.name||'?'} ${u.phone_verified?'📱':''}${u.is_admin?'🛡️':''}</p>
                        <p style="font-size:12px;color:#6B7280;margin-top:1px">${u.email}</p>
                        ${u.phone_number ? `<p style="font-size:11px;color:#4B5563">${u.phone_number}</p>` : ''}
                    </div>
                    <div style="text-align:right;flex-shrink:0">
                        <p style="font-size:13px;font-weight:700;color:#FBBF24">${spent.toLocaleString()} XPF</p>

                    </div>

                </div>`}).join('') || '<p style="color:#4B5563;text-align:center;padding:40px">Aucun élève trouvé</p>'}
            </div>
        </div>`;
    }

    // ── MONITEURS ────────────────────────────────────────────────────────────
    if (tab === 'instructors') {
        return `
        <div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                <p style="font-weight:800;font-size:16px">${adminData.instructors.length} moniteur${adminData.instructors.length>1?'s':''}</p>
                <input id="search-instructors" oninput="adminFilter('instructors')" placeholder="🔍 Rechercher..."
                    style="background:#1A1A1A;border:1px solid #2A2A2A;border-radius:10px;padding:8px 14px;color:#fff;font-size:13px;outline:none">
            </div>
            <div id="instructors-list" style="display:flex;flex-direction:column;gap:10px">
            ${adminData.instructors.map(i => {
                const myBookings = adminData.bookings.filter(b => b.instructor_id === i.id);
                const revenue = myBookings.filter(b => b.status === 'confirmed' && b.payment_status === 'paid').reduce((s,b) => s+(b.net||0), 0);
                const penalised = i.penalty_until && new Date(i.penalty_until) > now;
                return `
                <div style="background:#1A1A1A;border-radius:16px;padding:16px;border:1px solid ${penalised?'rgba(239,68,68,0.3)':i.is_online?'rgba(34,197,94,0.15)':'#222'}">
                    <div style="display:flex;align-items:flex-start;gap:14px">
                        <div style="width:50px;height:50px;border-radius:14px;background:#FF5A1F;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;flex-shrink:0;color:#fff;overflow:hidden">
                            ${i.avatar_url ? `<img src="${i.avatar_url}" style="width:100%;height:100%;object-fit:cover">` : `<img src="${DEFAULT_AVATAR}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit">`}
                        </div>
                        <div style="flex:1;min-width:0">
                            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
                                <p style="font-weight:900;font-size:15px">${i.name||'?'}</p>
                                <span style="padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:${i.is_online?'rgba(34,197,94,0.1)':'rgba(107,114,128,0.1)'};color:${i.is_online?'#34D399':'#6B7280'}">${i.is_online?'🟢 En ligne':'⚫ Hors ligne'}</span>
                                ${i.verified ? '<span style="padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(52,211,153,0.1);color:#34D399">✅ Vérifié</span>' : '<span style="padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(251,191,36,0.1);color:#FBBF24">⚠️ Non vérifié</span>'}
                                ${penalised ? `<span style="padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(239,68,68,0.1);color:#EF4444">🚫 Pénalisé</span>` : ''}
                            </div>
                            <p style="font-size:12px;color:#6B7280">📍 ${i.location||'?'} · ⭐ ${i.rating||0} · ${(i.hourly_rate||0).toLocaleString()} XPF/h · ${i.experience||0} ans exp.</p>
                            ${i.phone_number ? `<p style="font-size:11px;color:#4B5563;margin-top:2px">📱 ${i.phone_number} ${i.phone_verified?'✅':''}</p>` : ''}
                            <div style="display:flex;gap:16px;margin-top:8px">
                                <span style="font-size:12px;color:#FBBF24">💰 ${revenue.toLocaleString()} XPF gagnés</span>
                                <span style="font-size:12px;color:#60A5FA">📋 ${myBookings.length} réservations</span>
                                <span style="font-size:12px;color:#A78BFA">📅 ${adminData.slots.filter(s=>s.instructor_id===i.id&&s.available).length} créneaux dispo</span>
                            </div>
                        </div>
                    </div>
                    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
                        <button onclick="adminVerifyInstructor('${i.id}',${!i.verified})" 
                            style="padding:7px 14px;background:${i.verified?'rgba(239,68,68,0.1)':'rgba(52,211,153,0.1)'};border:1px solid ${i.verified?'rgba(239,68,68,0.2)':'rgba(52,211,153,0.2)'};color:${i.verified?'#EF4444':'#34D399'};border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">
                            ${i.verified ? '❌ Retirer vérification' : '✅ Vérifier'}
                        </button>
                        ${penalised ? `
                        <button onclick="adminRemovePenalty('${i.id}')" style="padding:7px 14px;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.2);color:#FBBF24;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">
                            🔓 Lever la pénalité
                        </button>` : `
                        <button onclick="adminPenalizeInstructor('${i.id}')" style="padding:7px 14px;background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.15);color:#6B7280;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">
                            🚫 Pénaliser
                        </button>`}
                        <button onclick="adminSetOnline('${i.id}',${!i.is_online})" style="padding:7px 14px;background:rgba(255,255,255,0.03);border:1px solid #2A2A2A;color:#9CA3AF;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">
                            ${i.is_online ? '📴 Mettre hors ligne' : '📶 Mettre en ligne'}
                        </button>
                        <button onclick="adminDeleteUser('${i.user_id||i.id}')" style="padding:7px 10px;background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.1);color:#EF4444;border-radius:8px;font-size:12px;cursor:pointer">🗑️</button>
                    </div>
                </div>`}).join('') || '<p style="color:#4B5563;text-align:center;padding:40px">Aucun moniteur</p>'}
            </div>
        </div>`;
    }

    // ── REVENUS ──────────────────────────────────────────────────────────────
    if (tab === 'revenue') {
        const paid = adminData.bookings.filter(b => b.status === 'confirmed' && b.payment_status === 'paid');
        const totalRev = paid.reduce((s,b) => s+(b.amount||0), 0);
        const totalCom = paid.reduce((s,b) => s+(b.commission||0), 0);
        const totalNet = paid.reduce((s,b) => s+(b.net||0), 0);

        const byMonth = {};
        paid.forEach(b => {
            const m = (b.date||'').substring(0,7);
            if (!byMonth[m]) byMonth[m] = { amount:0, commission:0, count:0 };
            byMonth[m].amount += b.amount||0;
            byMonth[m].commission += b.commission||0;
            byMonth[m].count++;
        });
        const months = Object.entries(byMonth).sort((a,b)=>a[0].localeCompare(b[0]));
        const maxVal = Math.max(...months.map(([,v])=>v.amount),1);

        // Croissance mois sur mois
        const lastTwo = months.slice(-2);
        const growth = lastTwo.length===2 && lastTwo[0][1].amount>0
            ? Math.round((lastTwo[1][1].amount-lastTwo[0][1].amount)/lastTwo[0][1].amount*100) : null;

        const byInstructor = {};
        paid.forEach(b => {
            if (!byInstructor[b.instructor_id]) byInstructor[b.instructor_id] = { name: b.instructor_name, amount:0, count:0 };
            byInstructor[b.instructor_id].amount += b.net||0;
            byInstructor[b.instructor_id].count++;
        });
        const topInst = Object.values(byInstructor).sort((a,b)=>b.amount-a.amount).slice(0,5);

        // SVG graphique
        const W=400, H=120, PAD=10;
        const barW = months.length > 0 ? Math.floor((W-PAD*2)/months.length*0.6) : 30;
        const gap = months.length > 0 ? Math.floor((W-PAD*2)/months.length) : 40;
        const svgBars = months.map(([m,v],i)=>{
            const bh = Math.max(4,Math.round(v.amount/maxVal*(H-30)));
            const x = PAD+i*gap+gap/2-barW/2;
            const y = H-bh-20;
            const isLast = i===months.length-1;
            return `<rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="5" fill="${isLast?'#FF5A1F':'rgba(255,90,31,0.4)'}"/>
            <text x="${x+barW/2}" y="${H-6}" text-anchor="middle" font-size="9" fill="#6B7280" font-family="DM Sans">${m.slice(5)}</text>
            ${isLast?`<text x="${x+barW/2}" y="${y-4}" text-anchor="middle" font-size="9" fill="#FF5A1F" font-family="DM Sans" font-weight="700">${Math.round(v.amount/1000)}k</text>`:''}`;
        }).join('');

        return `
        <div style="display:flex;flex-direction:column;gap:20px">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <div style="display:flex;align-items:center;gap:12px">
                    ${growth!==null?`<span style="background:${growth>=0?'rgba(52,211,153,0.12)':'rgba(239,68,68,0.12)'};color:${growth>=0?'#34D399':'#EF4444'};border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700">${growth>=0?'↑':'↓'} ${Math.abs(growth)}% vs mois précédent</span>`:''}
                </div>
                <button onclick="adminResetRevenueCounters()" style="padding:9px 18px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#EF4444;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer">🔄 Remettre à zéro</button>
            </div>

            <!-- KPIs -->
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">
                <div style="background:linear-gradient(135deg,rgba(255,90,31,0.12),rgba(255,90,31,0.04));border:1px solid rgba(255,90,31,0.25);border-radius:18px;padding:20px;text-align:center">
                    <p style="font-size:10px;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.5px;margin:0 0 8px">Chiffre d'affaires</p>
                    <p style="font-size:28px;font-weight:900;color:#FF5A1F;margin:0">${totalRev.toLocaleString()}</p>
                    <p style="font-size:12px;color:#6B7280;margin:4px 0 0">XPF total</p>
                </div>
                <div style="background:linear-gradient(135deg,rgba(251,191,36,0.12),rgba(251,191,36,0.04));border:1px solid rgba(251,191,36,0.25);border-radius:18px;padding:20px;text-align:center">
                    <p style="font-size:10px;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.5px;margin:0 0 8px">Commission DriveConnect</p>
                    <p style="font-size:28px;font-weight:900;color:#FBBF24;margin:0">${totalCom.toLocaleString()}</p>
                    <p style="font-size:12px;color:#6B7280;margin:4px 0 0">XPF (${totalRev>0?Math.round(totalCom/totalRev*100):0}%)</p>
                </div>
                <div style="background:linear-gradient(135deg,rgba(52,211,153,0.12),rgba(52,211,153,0.04));border:1px solid rgba(52,211,153,0.25);border-radius:18px;padding:20px;text-align:center">
                    <p style="font-size:10px;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.5px;margin:0 0 8px">Reversé moniteurs</p>
                    <p style="font-size:28px;font-weight:900;color:#34D399;margin:0">${totalNet.toLocaleString()}</p>
                    <p style="font-size:12px;color:#6B7280;margin:4px 0 0">XPF net</p>
                </div>
            </div>

            <!-- Graphique SVG -->
            <div style="background:#111;border:1px solid #1F1F1F;border-radius:20px;padding:22px">
                <p style="font-weight:800;font-size:15px;margin:0 0 16px">📈 Évolution du chiffre d'affaires</p>
                ${months.length===0?'<p style="color:#4B5563;text-align:center;padding:40px">Pas encore de données</p>':
                `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">
                    <defs><linearGradient id="revenueGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF5A1F"/><stop offset="100%" stop-color="rgba(255,90,31,0.2)"/></linearGradient></defs>
                    ${svgBars}
                </svg>`}
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
                <!-- Détail par mois -->
                <div style="background:#111;border:1px solid #1F1F1F;border-radius:20px;padding:20px">
                    <p style="font-weight:800;font-size:15px;margin:0 0 16px">📆 Détail par mois</p>
                    ${months.length===0?'<p style="color:#4B5563;text-align:center;padding:20px">Pas encore de données</p>':
                    [...months].reverse().map(([m,d])=>`
                    <div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #1F1F1F">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
                            <span style="font-size:13px;font-weight:700">${m}</span>
                            <div style="text-align:right">
                                <p style="font-size:13px;font-weight:800;color:#FF5A1F;margin:0">${d.amount.toLocaleString()} XPF</p>
                                <p style="font-size:10px;color:#FBBF24;margin:0">Com: ${d.commission.toLocaleString()} · ${d.count} cours</p>
                            </div>
                        </div>
                        <div style="background:#1F1F1F;border-radius:4px;height:4px">
                            <div style="background:#FF5A1F;height:4px;border-radius:4px;width:${Math.round(d.amount/maxVal*100)}%"></div>
                        </div>
                    </div>`).join('')}
                </div>
                <!-- Top moniteurs -->
                <div style="background:#111;border:1px solid #1F1F1F;border-radius:20px;padding:20px">
                    <p style="font-weight:800;font-size:15px;margin:0 0 16px">🏆 Top moniteurs</p>
                    ${topInst.length===0?'<p style="color:#4B5563;text-align:center;padding:20px">Pas encore de données</p>':
                    topInst.map((inst,idx)=>`
                    <div style="display:flex;align-items:center;gap:12px;padding:12px;background:#1A1A1A;border-radius:14px;margin-bottom:8px">
                        <span style="font-size:20px">${['🥇','🥈','🥉','4️⃣','5️⃣'][idx]}</span>
                        <div style="flex:1;min-width:0">
                            <p style="font-weight:700;font-size:13px;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${inst.name||'?'}</p>
                            <p style="font-size:11px;color:#6B7280;margin:2px 0 0">${inst.count} cours complétés</p>
                        </div>
                        <div style="text-align:right;flex-shrink:0">
                            <p style="font-weight:800;color:#34D399;font-size:14px;margin:0">${inst.amount.toLocaleString()}</p>
                            <p style="font-size:10px;color:#6B7280;margin:2px 0 0">XPF nets</p>
                        </div>
                    </div>`).join('')}
                </div>
            </div>
        </div>`;
    }

    // ── SIGNALEMENTS ──────────────────────────────────────────────────────────
    if (tab === 'signalements') {
        const disputes = adminData.bookings.filter(b => b.status === 'dispute' || b.dispute_reason);
        return `
        <div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                <p style="font-weight:800;font-size:16px">${disputes.length} signalement${disputes.length>1?'s':''}</p>
                <button onclick="this.textContent='⏳...';this.disabled=true;loadAdminData()" style="padding:8px 14px;background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.2);color:#60A5FA;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer">🔄 Actualiser</button>
            </div>
            ${disputes.length === 0 ? '<div style="text-align:center;padding:60px;color:#4B5563"><p style="font-size:40px;margin-bottom:12px">✅</p><p style="font-weight:700">Aucun signalement en cours</p></div>' :
            `<div style="display:flex;flex-direction:column;gap:12px">
            ${disputes.map(b => {
                const disputeLabels = {
                    'no_show': '🚫 Moniteur absent',
                    'bad_conduct': '⚠️ Comportement inapproprié',
                    'safety': '🛑 Problème de sécurité',
                    'student_absent': '🚫 Élève absent',
                    'bad_behavior': '⚠️ Comportement élève',
                    'other': '💬 Autre'
                };
                const signalLabel = disputeLabels[b.dispute_reason] || (b.dispute_reason || '⚠️ Litige');
                const reporterLabel = b.dispute_by === 'student' ? '👨‍🎓 Signalé par l\'élève' : '🚗 Signalé par le moniteur';
                return `
                <div style="background:#1A1A1A;border-radius:16px;padding:18px;border:1px solid rgba(147,51,234,0.3)">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
                        <div>
                            <p style="font-weight:800;font-size:15px">${b.student_name||'Élève'} ↔ ${b.instructor_name||'Moniteur'}</p>
                            <p style="font-size:12px;color:#6B7280;margin-top:2px">📅 ${b.date} à ${b.time}</p>
                        </div>
                        <span style="padding:4px 12px;background:rgba(147,51,234,0.15);color:#A78BFA;border-radius:20px;font-size:11px;font-weight:700">⚠️ Litige</span>
                    </div>
                    <div style="background:#111;border-radius:12px;padding:12px;margin-bottom:10px">
                        <p style="font-size:12px;color:#A78BFA;font-weight:700;margin-bottom:4px">${reporterLabel}</p>
                        <p style="font-size:14px;font-weight:700;color:#fff">${signalLabel}</p>
                        ${b.dispute_details ? `<p style="font-size:13px;color:#9CA3AF;margin-top:6px;line-height:1.5">${b.dispute_details}</p>` : ''}
                        ${b.dispute_at ? `<p style="font-size:10px;color:#4B5563;margin-top:6px">Signalé le ${new Date(b.dispute_at).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit',timeZone:NC_TZ})}</p>` : ''}
                    </div>
                    <!-- Infos contact -->
                    ${(()=>{
                        const studentUser = adminData.users.find(u => u.id === b.student_id);
                        const instUser = adminData.instructors.find(i => i.id === b.instructor_id);
                        return `<div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap">
                            ${studentUser?.phone_number ? `<span style="font-size:12px;color:#60A5FA">📱 Élève: ${studentUser.phone_number}</span>` : ''}
                            ${instUser?.phone_number ? `<span style="font-size:12px;color:#34D399">📱 Moniteur: ${instUser.phone_number}</span>` : ''}
                        </div>`;
                    })()}
                    <div style="display:flex;gap:8px;flex-wrap:wrap">
                        <button onclick="adminResolveDispute('${b.id}','student')" style="padding:8px 14px;background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.2);color:#60A5FA;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">✅ Résoudre (faveur élève)</button>
                        <button onclick="adminResolveDispute('${b.id}','instructor')" style="padding:8px 14px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.2);color:#34D399;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">✅ Résoudre (faveur moniteur)</button>
                        <button onclick="adminForceCancel('${b.id}')" style="padding:8px 14px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);color:#EF4444;border-radius:8px;font-size:12px;cursor:pointer">🗑️ Annuler résa</button>
                    </div>
                </div>`;
            }).join('')}
            </div>`}
        </div>`;
    }

    // ── CARTE LIVE ───────────────────────────────────────────────────────────
    if (tab === 'map') {
        return `
        <div>
            <p style="font-weight:800;font-size:16px;margin-bottom:16px">🗺️ Position des moniteurs en temps réel</p>
            <div style="background:#111;border:1px solid #1F1F1F;border-radius:20px;overflow:hidden">
                <div id="map" style="height:500px"></div>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px">
                ${adminData.instructors.filter(i => i.lat).map(i => `
                <div style="background:#1A1A1A;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px">
                    <div style="width:8px;height:8px;border-radius:50%;background:${i.is_online?'#22C55E':'#6B7280'}"></div>
                    <span style="font-size:13px;font-weight:600">${i.name||'?'}</span>
                    <span style="font-size:11px;color:#4B5563">${i.location||''}</span>
                </div>`).join('')}
            </div>
        </div>`;
    }

    // ── ZONE ADMIN ───────────────────────────────────────────────────────────
    if (tab === 'danger') {
        return `
        <div style="display:flex;flex-direction:column;gap:16px;max-width:600px">

            <!-- Exports CSV -->
            <div style="background:rgba(52,211,153,0.05);border:1px solid rgba(52,211,153,0.2);border-radius:16px;padding:20px">
                <p style="font-weight:800;font-size:15px;color:#34D399;margin-bottom:4px">📥 Exports de données</p>
                <p style="font-size:13px;color:#6B7280;margin-bottom:16px">Téléchargez les données en format CSV pour analyse.</p>
                <div style="display:flex;flex-direction:column;gap:8px">
                    <button onclick="adminExportCSV('users')" style="padding:10px 20px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:#34D399;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;text-align:left">📊 Exporter les utilisateurs (${adminData.users.length})</button>
                    <button onclick="adminExportCSV('bookings')" style="padding:10px 20px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:#34D399;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;text-align:left">📋 Exporter les réservations (${adminData.bookings.length})</button>
                    <button onclick="adminExportCSV('instructors')" style="padding:10px 20px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:#34D399;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;text-align:left">🚗 Exporter les moniteurs (${adminData.instructors.length})</button>
                    <button onclick="adminExportCSV('revenue')" style="padding:10px 20px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:#34D399;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;text-align:left">💰 Exporter les revenus (paiements confirmés)</button>
                </div>
            </div>

// ── Helper : exécuter une action admin via RPC (bypass RLS) ──
async function adminExec(table, action, data, filterCol, filterVal) {
    // Tenter RPC générique admin
    const rpc = await sb.rpc('admin_exec', { 
        p_table: table, p_action: action, 
        p_data: JSON.stringify(data || {}), 
        p_filter_col: filterCol || 'id', 
        p_filter_val: filterVal || '' 
    });
    if (!rpc.error) return { success: true };
    // Fallback direct (marche si RLS le permet)
    console.warn('[ADMIN] RPC admin_exec failed, trying direct:', rpc.error.message);
    if (action === 'update') {
        const r = await sb.from(table).update(data).eq(filterCol || 'id', filterVal);
        return r.error ? { success: false, error: r.error.message } : { success: true };
    }
    if (action === 'delete') {
        const r = await sb.from(table).delete().eq(filterCol || 'id', filterVal);
        return r.error ? { success: false, error: r.error.message } : { success: true };
    }
    return { success: false, error: 'Unknown action' };
}

window.adminResetRevenueCounters = async () => {
    if (!confirm('⚠️ Remettre les compteurs revenus à 0 ?\n\nToutes les réservations payées seront marquées "archivées". Les revenus affichés repartiront de zéro. Irréversible.')) return;

    const btn = event && event.target ? event.target : null;
    if (btn) { btn.textContent = '⏳ Archivage...'; btn.disabled = true; }

    try {
        // Récupérer d'abord tous les IDs à archiver (évite le bug RLS sur update .eq sans .select)
        const { data: toArchive, error: fetchErr } = await sb
            .from('bookings')
            .select('id')
            .eq('payment_status', 'paid');

        if (fetchErr) throw new Error(fetchErr.message);
        if (!toArchive || toArchive.length === 0) {
            notif('ℹ️ Déjà à zéro', 'Aucune réservation payée à archiver', 'orange');
            if (btn) { btn.textContent = '🔄 Remettre les compteurs à 0'; btn.disabled = false; }
            return;
        }

        const ids = toArchive.map(r => r.id);

        // Mise à jour en un seul appel avec filtre IN (plus fiable que .eq sur tout)
        const { error: updateErr } = await sb
            .from('bookings')
            .update({ payment_status: 'archived' })
            .in('id', ids);

        if (updateErr) {
            // Fallback : mise à jour locale (affichage seul) si RLS bloque
            if (adminData && adminData.bookings) {
                adminData.bookings.forEach(b => {
                    if (ids.includes(b.id)) b.payment_status = 'archived';
                });
            }
            notif('⚠️ Remise à zéro locale uniquement', 'RLS Supabase bloque la mise à jour en base. Rafraîchissez la page pour vérifier. (' + ids.length + ' réservations concernées)', 'orange');
        } else {
            notif('✅ Compteurs remis à 0', ids.length + ' réservation(s) archivée(s) avec succès', 'green');
        }

        await loadAdminData();
    } catch(e) {
        notif('❌ Erreur', e.message, 'red');
    } finally {
        if (btn) { btn.textContent = '🔄 Remettre les compteurs à 0'; btn.disabled = false; }
    }
};

window.adminExportCSV = function(type) {
    let rows = [], filename = '';
    const esc = v => '"' + String(v||'').replace(/"/g,'""') + '"';

    if (type === 'users') {
        filename = 'driveconnect-utilisateurs.csv';
        rows = [['ID','Nom','Email','Type','Date inscription']];
        adminData.users.forEach(u => rows.push([
            esc(u.id), esc(u.name), esc(u.email),
            esc(u.user_type==='student'?'Élève':'Moniteur'),
            esc(u.created_at?.split('T')[0]||'')
        ]));
    } else if (type === 'bookings') {
        filename = 'driveconnect-reservations.csv';
        rows = [['ID','Date','Heure','Durée','Élève','Moniteur','Montant XPF','Commission XPF','Net XPF','Statut','Paiement','Créé le']];
        adminData.bookings.forEach(b => rows.push([
            esc(b.id), esc(b.date), esc(b.time), esc(b.duration),
            esc(b.student_name), esc(b.instructor_name),
            esc(b.amount||0), esc(b.commission||0), esc(b.net||0),
            esc(b.status), esc(b.payment_status),
            esc(b.created_at?.split('T')[0]||'')
        ]));
    } else if (type === 'instructors') {
        filename = 'driveconnect-moniteurs.csv';
        rows = [['ID','Nom','Email','Localisation','Tarif XPF/h','Exp. ans','Note','Avis','Statut','Vérifié','En ligne','Inscription']];
        adminData.instructors.forEach(i => {
            const u = adminData.users.find(u=>u.id===i.id||u.id===i.user_id);
            rows.push([
                esc(i.id), esc(i.name), esc(u?.email||i.email),
                esc(i.location), esc(i.hourly_rate||0), esc(i.experience||0),
                esc(i.rating||''), esc(i.total_reviews||0),
                esc(i.approval_status), esc(i.verified?'Oui':'Non'),
                esc(i.is_online?'Oui':'Non'),
                esc(u?.created_at?.split('T')[0]||'')
            ]);
        });
    } else if (type === 'revenue') {
        filename = 'driveconnect-revenus.csv';
        rows = [['Date','Élève','Moniteur','Montant XPF','Commission XPF','Net XPF']];
        adminData.bookings
            .filter(b=>b.status==='confirmed'&&b.payment_status==='paid')
            .sort((a,b)=>new Date(b.date)-new Date(a.date))
            .forEach(b => rows.push([
                esc(b.date), esc(b.student_name), esc(b.instructor_name),
                esc(b.amount||0), esc(b.commission||0), esc(b.net||0)
            ]));
    }

    const csv = rows.map(r=>r.join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csv], { type:'text/csv;charset=utf-8' }); // BOM pour Excel
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
    notif('📥 Export téléchargé !', filename, 'green');
};

window.adminResetAllGPS = async () => {

    if (!rpc.error) {
        notif('📴 Tous les moniteurs mis hors ligne', '', 'orange');
        await loadAdminData();
        return;
    }
    
    // Fallback : mettre à jour chaque moniteur individuellement
    console.warn('[ADMIN] RPC admin_reset_all_gps failed, using fallback:', rpc.error.message);
    const promises = adminData.instructors.map(i => 
        sb.from('instructors').update({ is_online: false }).eq('id', i.id)
    );
    const results = await Promise.all(promises);
    const errors = results.filter(r => r.error);
    if (errors.length > 0) {
        console.warn('[ADMIN] Reset GPS errors:', errors.length, 'failed');
        notif('⚠️ Certains moniteurs n\'ont pas pu être mis à jour (RLS)', 'Exécutez le SQL admin dans Supabase', 'yellow');
    } else {
        notif('📴 Tous les moniteurs mis hors ligne', '', 'orange');
    }
    await loadAdminData();
};

    try {
        const reg = await navigator.serviceWorker.ready;
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') return;
        const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: VAPID_PUBLIC });

async function applyReferralCode(newUserId, referralCode) {
    // Le code de parrainage fonctionne pour tout inscrit (moniteur ou élève)
    if (!referralCode || referralCode.length !== 8) return;
    const code = referralCode.toUpperCase().trim();

    // Récupérer le moniteur parrain
    const { data: referrer } = await sb.from('instructors').select('id, name, referral_code, referral_count').eq('referral_code', code).single();
    if (!referrer) { notif('⚠️ Code invalide', 'Ce code de parrainage n\'existe pas', 'yellow'); return; }

    // Vérifier que le code n'est pas désactivé (max 10 parrainages aboutis)
    const currentCount = referrer.referral_count || 0;
    if (currentCount >= 10) {
        notif('⚠️ Code inactif', 'Ce code de parrainage a atteint son maximum de 10 utilisations et est désactivé.', 'yellow');
        return;
    }

    // Vérifier que cette personne n'a pas déjà utilisé un code (non cumulable)
    const { data: existingRef } = await sb.from('referrals').select('id').eq('referred_id', newUserId).maybeSingle();
    if (existingRef) { notif('⚠️ Déjà parrainé', 'Vous avez déjà utilisé un code de parrainage.', 'yellow'); return; }

    // Créer le parrainage — commission_discount = 1% par heure de conduite valide (1 seule fois)
    await sb.from('referrals').insert({
        referrer_id: referrer.id,
        referred_id: newUserId,
        referral_code: code,
        status: 'active',
        bonus_used: false,        // devient true après utilisation unique
        commission_discount: 1     // 1% de commission en moins sur 1 cours validé
    });

    // Incrémenter le compteur du parrain
    const newCount = currentCount + 1;
    const updates = { referral_count: newCount };
    // Si 10 parrainages atteints → désactiver le code
    if (newCount >= 10) {
        updates.referral_code_active = false;
    }
    await sb.from('instructors').update(updates).eq('id', referrer.id);

    sendPushToUser(referrer.id, '🎉 Nouveau filleul !', `Quelqu'un a rejoint DriveConnect avec votre code ! (${newCount}/10)`);
    notif('✅ Code appliqué !', `Parrain : ${referrer.name}. Bonus 1% sur votre 1er cours validé.`, 'green');
}
