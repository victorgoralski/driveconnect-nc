async function boot() {
    setupAppEnhancements();
    document.getElementById('app').innerHTML = `<div class="min-h-screen bg-gradient-to-br from-orange-50 to-white flex items-center justify-center">
        <div class="text-center" style="display:flex;flex-direction:column;align-items:center">
            ${renderBrandWordmark({ size:'lg', textColor:'#EA580C' })}
            <p class="text-gray-400 mt-2">Connexion à la base de données...</p>
            <div class="mt-4 w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
        </div>
    </div>`;
    try {
    const reachable = await checkSupabaseReachable();
    if (!reachable) {
        renderMaintenanceScreen();
        return;
    }

    const urlHash = window.location.hash;
    const urlParams = new URLSearchParams(window.location.search);
    const roleParam = urlParams.get('role');
    const adminKey  = urlParams.get('admin');

    // ── 1. RESET MOT DE PASSE ──────────────────────────────────────────────
    // Supabase envoie #access_token=...&type=recovery dans le hash après clic sur le lien mail
    const isRecovery = urlHash.includes('type=recovery');

    if (isRecovery) {
        // Laisser Supabase établir la session depuis les tokens du hash
        // On écoute PASSWORD_RECOVERY via onAuthStateChange
        await new Promise(resolve => {
            const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
                if (event === 'PASSWORD_RECOVERY') {
                    subscription.unsubscribe();
                    resolve();
                }
                // Timeout sécurité 4s
            });
            setTimeout(resolve, 4000);
        });
        // Nettoyer l'URL
        window.history.replaceState({}, document.title, window.location.pathname);
        // Afficher la modale de reset
        await loadData();
        render();
        setTimeout(() => showResetPasswordModal(), 200);
        return;
    }

    // ── 2. CONNEXION GOOGLE (OAuth callback) ──────────────────────────────
    const isOAuthCallback = urlHash.includes('access_token') && !isRecovery;
    const hasPendingGoogleType = !!localStorage.getItem('google_oauth_type');

    if (isOAuthCallback || hasPendingGoogleType) {
        // Récupérer la session (Supabase l'a déjà parsée depuis le hash)
        const { data: { session } } = await sb.auth.getSession();

        if (session && session.user?.app_metadata?.provider === 'google') {
            window.history.replaceState({}, document.title, window.location.pathname);
            await handleGoogleCallback(session);
            await loadData();
            render();
            return;
        }

        // Session pas encore dispo → attendre onAuthStateChange
        if (!session && isOAuthCallback) {
            await new Promise(resolve => {
                const { data: { subscription } } = sb.auth.onAuthStateChange(async (event, newSession) => {
                    if (newSession) {
                        subscription.unsubscribe();
                        window.history.replaceState({}, document.title, window.location.pathname);
                        await handleGoogleCallback(newSession);
                        await loadData();
                        render();
                        resolve();
                    }
                });
                setTimeout(resolve, 5000);
            });
            return;
        }
    }

    // ── 3. SESSION NORMALE (déjà connecté) ────────────────────────────────
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
        const userId = session.user.id;
        const meta = session.user.user_metadata || {};
        let { data: profile, error: profErr } = await sb.from('users').select('*').eq('id', userId).maybeSingle();
        
        // Si pas de profil, le créer depuis les métadonnées
        if (!profile) {
            console.log('[BOOT] No profile found, creating from metadata...');
            const savedType = meta.user_type || null;
            const { data: newProf } = await sb.from('users').upsert({
                id: userId,
                email: session.user.email,
                name: meta.name || session.user.email.split('@')[0],
                user_type: savedType
            }, { onConflict: 'id' }).select().single();
            profile = newProf;
            // Si toujours pas, attendre et réessayer
            if (!profile) {
                await new Promise(r => setTimeout(r, 1000));
                const retry = await sb.from('users').select('*').eq('id', userId).maybeSingle();
                profile = retry.data;
            }
        }
        
        // Si profil existe mais user_type null, corriger
        if (profile && !profile.user_type && meta.user_type) {
            await sb.from('users').update({ user_type: meta.user_type }).eq('id', userId);
            profile.user_type = meta.user_type;
        }

        if (profile) {
            currentUser = { ...session.user, ...profile, user_type: profile.user_type || meta.user_type };
            _recoverAvatar();

            // Accès admin : soit is_admin en base, soit clé URL secrète
            if (profile.is_admin || adminKey === 'dc2024') {
                currentView = 'admin';
            } else if (currentUser.user_type === 'instructor') {
                const { data: instProfile } = await sb.from('instructors').select('approval_status').eq('id', userId).maybeSingle();
                const status = instProfile?.approval_status || 'pending_documents';
                if (status === 'approved') {
                    currentView = 'instructor-dashboard';
                } else if (status === 'pending_documents') {
                    currentView = 'instructor-upload-docs';
                } else if (status === 'rejected') {
                    currentView = 'instructor-rejected';
                } else {
                    currentView = 'instructor-pending';
                }
            } else {
                currentView = 'student-dashboard';
            }
        }
    } else if (roleParam === 'instructor') {
        currentView = 'instructor-login';
    } else if (roleParam === 'student') {
        currentView = 'student-login';
    }
    subscribeToPush();
    checkReferralInUrl();

    await loadData();
    initNoShowGuards();
    render();

    // Deep-link ?instructor=ID → ouvrir le profil directement
    if (window._pendingInstructorDeepLink) {
        const targetId = window._pendingInstructorDeepLink;
        window._pendingInstructorDeepLink = null;
        setTimeout(() => {
            // Si l'élève est connecté → ouvrir directement
            if (currentUser?.user_type === 'student') {
                window.showInstructorProfile(targetId);
            } else if (!currentUser) {
                // Non connecté → aller sur la page élève, stocker pour après login
                localStorage.setItem('pending_instructor_profile', targetId);
                currentView = 'student-login';
                render();
                notif('🚗 Profil moniteur', 'Connectez-vous pour voir ce profil', 'orange');
            }
        }, 400);
    }

    // Charger les données de parrainage APRÈS render (les éléments DOM doivent exister)
    setTimeout(() => loadReferralData(), 300);

    // Refresh données sans re-render complet si sur carte
    setInterval(async () => {
        if (!document.hidden && currentView !== 'admin') {
            // Ne JAMAIS re-render les pages d'upload docs (détruit les inputs file)
            if (currentView === 'instructor-upload-docs' || currentView === 'instructor-rejected' || currentView === 'instructor-pending') return;

            try { await loadData(); } catch (_) { return; }
            if (currentUser) {
                // Si sur le dashboard étudiant avec carte visible, juste mettre à jour les markers
                if (currentView === 'student-dashboard' && map && iMarkers.length > 0) {
                    updateMapMarkers();
                } else {
                    render();
                }
            }
        }
    }, 10000); // 10s pour plus de réactivité
    } catch (e) {
        await logAppError('boot', e);
        renderMaintenanceScreen();
    }
}


window.submitRating = async function(bookingId, instructorId) {
    const rating = window._selectedRating || 0;
    if (!rating) { notif('❌ Choisissez une note', '', 'red'); return; }

    const { data: instructor } = await sb.from('instructors').select('rating,total_reviews').eq('id', instructorId).single();
    if (!instructor) { notif('❌ Erreur', '', 'red'); return; }

    const newTotal = (instructor.total_reviews || 0) + 1;
    const newRating = (((instructor.rating || 0) * (instructor.total_reviews || 0)) + rating) / newTotal;

    await sb.from('instructors').update({
        rating: Math.round(newRating * 10) / 10,
        total_reviews: newTotal
    }).eq('id', instructorId);

    await sb.from('bookings').update({ rated: true, rating_given: rating }).eq('id', bookingId);

    const modal = document.getElementById('rating-modal');
    if (modal) modal.remove();
    notif('⭐ Merci pour votre avis !', `Vous avez donné ${rating}/5 étoiles`, 'green');
    await loadData();
    render();
}

window._selectReportOption = function(optId) {
    window._reportSelectedOption = optId;
    document.querySelectorAll('#report-options button').forEach(b => {
        b.style.borderColor = b.dataset.opt === optId ? '#9333EA' : '#2A2A2A';
        b.style.background = b.dataset.opt === optId ? 'rgba(147,51,234,0.1)' : '#1A1A1A';
    });
    const btn = document.getElementById('report-submit-btn');
    if (btn) { btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; btn.disabled = false; }
};

window._submitReport = async function(bookingId, reporterType) {
    const reason = window._reportSelectedOption;
    const details = document.getElementById('report-details')?.value?.trim() || '';
    if (!reason) return;
    const btn = document.getElementById('report-submit-btn');
    if (btn) { btn.textContent = '⏳...'; btn.disabled = true; }

    const booking = DB.bookings.find(x => x.id === bookingId);

    // Mise à jour du booking → c'est ce que l'admin lit dans l'onglet Signalements
    const { error: updateError } = await sb.from('bookings').update({
        status: 'dispute',
        dispute_reason: reason,
        dispute_details: details,
        dispute_by: reporterType,
        dispute_at: new Date().toISOString()
    }).eq('id', bookingId);

    if (updateError) {
        notif('❌ Erreur', 'Impossible d\'envoyer le signalement : ' + updateError.message, 'red');
        if (btn) { btn.textContent = 'Envoyer'; btn.disabled = false; }
        return;
    }

    // Mise à jour locale immédiate pour que l'admin le voie sans recharger
    const localBooking = DB.bookings.find(x => x.id === bookingId);
    if (localBooking) {
        localBooking.status = 'dispute';
        localBooking.dispute_reason = reason;
        localBooking.dispute_details = details;
        localBooking.dispute_by = reporterType;
        localBooking.dispute_at = new Date().toISOString();
    }

    document.getElementById('report-modal')?.remove();
    notif('⚠️ Signalement envoyé', 'L\'administration traitera votre demande sous 24-48h', 'orange');
    await loadData(); render();
};

// ========== MÉTÉO PROCHAIN COURS ==========
async function _fetchNextCourseWeather(role) {
    try {
    const LAT = -22.2758, LNG = 166.4580;
    const bookings = DB.bookings || [];
    const next = bookings.filter(b=>b.status==='confirmed'&&new Date(b.date)>=new Date())
                         .sort((a,b)=>new Date(a.date)-new Date(b.date))[0];
    if (!next) return;

    const iconEl   = document.getElementById('weather-icon-next');
    const descEl   = document.getElementById('weather-desc-next');
    const tempEl   = document.getElementById('weather-temp-next');
    const windEl   = document.getElementById('weather-wind-next');
    if (!iconEl) return;

    try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LNG}`
            + `&daily=weathercode,temperature_2m_max,temperature_2m_min,windspeed_10m_max`
            + `&timezone=Pacific%2FNoumea&start_date=${next.date}&end_date=${next.date}`;
        const res  = await fetch(url);
        const data = await res.json();
        if (!data.daily) throw new Error('no data');

        const code  = data.daily.weathercode[0];
        const tMax  = Math.round(data.daily.temperature_2m_max[0]);
        const tMin  = Math.round(data.daily.temperature_2m_min[0]);
        const wind  = Math.round(data.daily.windspeed_10m_max[0]);

        const wmoCodes = {
            0:['☀️','Ensoleillé'], 1:['🌤️','Peu nuageux'], 2:['⛅','Nuageux'], 3:['☁️','Couvert'],
            45:['🌫️','Brouillard'], 48:['🌫️','Brouillard givrant'],
            51:['🌦️','Bruine légère'], 53:['🌦️','Bruine'], 55:['🌧️','Bruine forte'],
            61:['🌧️','Pluie légère'], 63:['🌧️','Pluie'], 65:['🌧️','Pluie forte'],
            71:['🌨️','Neige légère'], 73:['🌨️','Neige'], 75:['🌨️','Neige forte'],
            80:['🌦️','Averses légères'], 81:['🌧️','Averses'], 82:['⛈️','Averses fortes'],
            95:['⛈️','Orage'], 96:['⛈️','Orage grêle'], 99:['⛈️','Orage fort']
        };
        const [icon, desc] = wmoCodes[code] || ['🌡️','Conditions variables'];
        const isBad = [61,63,65,80,81,82,95,96,99].includes(code);
        const isWind = wind > 40;

        if (iconEl) iconEl.textContent = icon;
        if (descEl) {
            descEl.textContent = desc;
            if (isBad || isWind) { descEl.style.color = '#F59E0B'; descEl.textContent += isBad ? ' ⚠️' : ''; }
        }
        if (tempEl) tempEl.textContent = tMax + '°C';
        if (windEl) windEl.textContent = `↓${tMin}° · 💨 ${wind} km/h`;

        if ((isBad || isWind) && document.getElementById('weather-next-course')) {
            const tip = document.createElement('p');
            tip.style.cssText = 'font-size:11px;color:#F59E0B;margin:8px 0 0;font-weight:700';
            tip.textContent = isBad ? '⚠️ Pluie prévue — pensez à prévenir votre moniteur si vous avez un 2 roues' : '⚠️ Vents forts — conditions difficiles pour la moto';
            document.getElementById('weather-next-course').appendChild(tip);
        }
    } catch(e) {
        if (descEl) descEl.textContent = 'Météo indisponible';
    }
    } catch(e) { /* silencieux */ }
}

window._joinWaitlist = async function(slotId, instructorId, btn) {
    if (!currentUser) { notif('❌ Connectez-vous d\'abord', '', 'red'); return; }
    if (btn) { btn.textContent = '⏳…'; btn.disabled = true; }
    const { error } = await sb.from('waitlist').insert({

        student_id: currentUser.id,
        student_name: currentUser.name || 'Élève'
    });
    if (error) { notif('❌ Erreur', error.message, 'red'); if(btn){btn.textContent='⏳ File d\'attente';btn.disabled=false;} return; }
    DB.waitlist = [...(DB.waitlist||[]), { slot_id: slotId, student_id: currentUser.id }];
    if (btn) { btn.textContent = '❌ Se désinscrire'; btn.style.background='#FEF2F2'; btn.style.color='#DC2626'; btn.style.borderColor='#FCA5A5'; btn.disabled = false; btn.onclick = ()=>window._leaveWaitlist(slotId, btn); }
    notif('✅ Inscrit en liste d\'attente !', 'Vous serez notifié si le créneau se libère', 'green');
};

window._leaveWaitlist = async function(slotId, btn) {
    if (btn) { btn.textContent = '…'; btn.disabled = true; }
    await sb.from('waitlist').delete().eq('slot_id', slotId).eq('student_id', currentUser.id);
    DB.waitlist = (DB.waitlist||[]).filter(w=>w.slot_id!==slotId);
    if (btn) { btn.textContent = '⏳ File d\'attente'; btn.style.background='#FFFBEB'; btn.style.color='#D97706'; btn.style.borderColor='#FDE68A'; btn.disabled=false; btn.onclick=()=>window._joinWaitlist(slotId,null,btn); }
    notif('↩️ Retiré de la liste d\'attente', '', 'orange');
};

// Notifier la liste d'attente quand un créneau se libère (après annulation)
async function _notifyWaitlist(slotId) {
    try {
        const { data: waiters } = await sb.from('waitlist').select('*').eq('slot_id', slotId).order('created_at', { ascending: true });
        if (!waiters || !waiters.length) return;
        const slot = DB.slots.find(s=>s.id===slotId);
        const slotInfo = slot ? `${slot.date} à ${slot.time}` : 'Créneau disponible';
        for (const w of waiters) {
            await sendPushToUser(w.student_id, '🔔 Créneau disponible !', `Le créneau ${slotInfo} que vous attendiez vient de se libérer. Réservez vite !`);
            await sb.from('waitlist').update({ notified_at: new Date().toISOString() }).eq('id', w.id);
        }
    } catch(e) { console.error('[waitlist notify]', e); }
}

// ========== RAPPELS AUTOMATIQUES ==========
let _reminderIntervalId = null;

async function _checkReminders() {
    try {
        if (!currentUser || !DB.bookings?.length) return;
        const now = new Date();
        const confirmed = DB.bookings.filter(b=>b.status==='confirmed');
        for (const b of confirmed) {
            if (!b.date || !b.time) continue;
            try {
                const courseTime = new Date(b.date + 'T' + b.time + ':00');
                const diffH = (courseTime - now) / (1000 * 60 * 60);
                if (diffH > 0 && diffH <= 24 && diffH > 23) {
                    const key = 'reminder_24h_' + b.id;
                    if (!localStorage.getItem(key)) {
                        localStorage.setItem(key, '1');
                        _showReminderNotif('📅 Cours demain !', `Votre cours avec ${b.instructor_name||'votre moniteur'} est demain à ${b.time}`, b);
                    }
                }
                if (diffH > 0 && diffH <= 1) {
                    const key = 'reminder_1h_' + b.id;
                    if (!localStorage.getItem(key)) {
                        localStorage.setItem(key, '1');
                        _showReminderNotif('⏰ Cours dans 1h !', `N\'oubliez pas votre cours avec ${b.instructor_name||'votre moniteur'} à ${b.time}`, b);
                    }
                }
            } catch(e) { /* ignorer les erreurs par réservation */ }
        }
    } catch(e) { /* ignorer silencieusement */ }
}

function _showReminderNotif(title, msg, booking) {
    // Notification in-app
    notif(title, msg, 'orange');
    // Notification native si permission
    if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(title, {
            body: msg,
            icon: '/icon-192.png',
            tag: 'reminder-' + booking.id
        });
    }
}

function _startReminderCheck() {
    _checkReminders(); // Check immédiat
    if (_reminderIntervalId) clearInterval(_reminderIntervalId);
    _reminderIntervalId = setInterval(_checkReminders, 60 * 1000); // Toutes les minutes
}

// ========== EXPORT iCAL ==========
function _buildICalEvent(booking, role) {
    const pad = n => String(n).padStart(2,'0');
    const toICalDate = (dateStr, timeStr) => {
        const d = new Date(dateStr + 'T' + (timeStr||'08:00') + ':00');
        return d.getUTCFullYear()+pad(d.getUTCMonth()+1)+pad(d.getUTCDate())+'T'+pad(d.getUTCHours())+pad(d.getUTCMinutes())+'00Z';
    };
    const dtStart = toICalDate(booking.date, booking.time);
    const endDate = new Date(booking.date + 'T' + (booking.time||'08:00') + ':00');
    endDate.setHours(endDate.getHours() + (parseFloat(booking.duration)||1));
    const dtEnd = endDate.getUTCFullYear()+pad(endDate.getUTCMonth()+1)+pad(endDate.getUTCDate())+'T'+pad(endDate.getUTCHours())+pad(endDate.getUTCMinutes())+'00Z';
    const title = role==='student' ? `Cours de conduite avec ${booking.instructor_name||'Moniteur'}` : `Cours avec ${booking.student_name||'Élève'}`;
    const uid = booking.id + '@driveconnect.nc';
    return [
        'BEGIN:VEVENT',
        'UID:' + uid,
        'DTSTAMP:' + toICalDate(new Date().toISOString().split('T')[0], new Date().toTimeString().substr(0,5)),
        'DTSTART:' + dtStart,
        'DTEND:' + dtEnd,
        'SUMMARY:' + title,
        'DESCRIPTION:DriveConnect NC — ' + booking.date + ' à ' + (booking.time||'') + ' — ' + (booking.duration||1) + 'h',
        'END:VEVENT'
    ].join('\r\n');
}

function _downloadICal(events, filename) {
    const cal = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//DriveConnect NC//FR',
        'CALSCALE:GREGORIAN',
        'METHOD:PUBLISH',
        ...events,
        'END:VCALENDAR'
    ].join('\r\n');
    const blob = new Blob([cal], { type: 'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    notif('✅ Fichier exporté !', 'Ouvrez le fichier .ics pour l\'ajouter à votre calendrier', 'green');
}

    _rtcHangup(true);
    document.getElementById('chat-modal')?.remove();

// ========== WebRTC VIDEO CALL ==========
let _rtcPeer          = null;
let _rtcLocalStream   = null;
let _rtcSignalSub     = null;
let _rtcCallBookingId = null;
let _rtcCallOtherUserId = null;
let _rtcCallOtherName = null;
let _rtcIncomingOffer = null;

const _STUN = { iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' }
]};

async function _rtcSendSignal(bookingId, toUserId, type, payload) {
    try {
        await sb.from('webrtc_signals').insert({
            booking_id:   String(bookingId),
            from_user_id: currentUser.id,
            to_user_id:   toUserId,
            type,
            payload
        });
    } catch(e) { console.error('[RTC] sendSignal error', e); }
}

function _rtcSubscribe(bookingId, otherUserId, otherName) {
    if (_rtcSignalSub) { try { _rtcSignalSub.unsubscribe(); } catch(e){} }
    _rtcSignalSub = sb.channel('rtc-sig-' + bookingId)
        .on('postgres_changes', {
            event: 'INSERT', schema: 'public', table: 'webrtc_signals',
            filter: 'booking_id=eq.' + bookingId
        }, payload => {
            const sig = payload.new;
            if (sig.to_user_id !== currentUser.id) return;
            _rtcHandleSignal(sig, otherUserId, otherName);
        })
        .subscribe();
}

async function _rtcStartCall(bookingId, otherUserId, otherName) {
    if (_rtcPeer) { notif('📹 Appel en cours', 'Terminez l\'appel actuel d\'abord', 'orange'); return; }
    _rtcCallBookingId   = bookingId;
    _rtcCallOtherUserId = otherUserId;
    _rtcCallOtherName   = otherName;
    try {
        _rtcLocalStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    } catch(e) {
        notif('❌ Caméra/Micro refusé', 'Autorisez l\'accès dans votre navigateur', 'red'); return;
    }
    _rtcPeer = new RTCPeerConnection(_STUN);
    _rtcLocalStream.getTracks().forEach(t => _rtcPeer.addTrack(t, _rtcLocalStream));
    _rtcPeer.onicecandidate = e => { if (e.candidate) _rtcSendSignal(bookingId, otherUserId, 'ice', { candidate: e.candidate }); };
    _rtcPeer.ontrack = e => {
        const v = document.getElementById('rtc-remote-video');
        if (v) { v.srcObject = e.streams[0]; document.getElementById('rtc-waiting-label')?.remove(); }
    };
    const offer = await _rtcPeer.createOffer();
    await _rtcPeer.setLocalDescription(offer);
    await _rtcSendSignal(bookingId, otherUserId, 'offer', { sdp: offer });
    _rtcShowCallingUI(otherName);
}

async function _rtcHandleSignal(sig, otherUserId, otherName) {
    if (sig.type === 'offer') {
        _rtcIncomingOffer   = sig;
        _rtcCallOtherUserId = sig.from_user_id;
        _rtcCallBookingId   = sig.booking_id;
        _rtcCallOtherName   = otherName || 'Votre contact';
        _rtcShowIncomingUI(_rtcCallOtherName);
    } else if (sig.type === 'answer') {
        if (_rtcPeer) {
            await _rtcPeer.setRemoteDescription(new RTCSessionDescription(sig.payload.sdp));
            _rtcShowVideoUI(_rtcCallOtherName);
        }
    } else if (sig.type === 'ice') {
        if (_rtcPeer && sig.payload?.candidate) {
            try { await _rtcPeer.addIceCandidate(new RTCIceCandidate(sig.payload.candidate)); } catch(e){}
        }
    } else if (sig.type === 'hangup') {
        _rtcHangup(true);
        notif('📵 Appel terminé', (_rtcCallOtherName || 'L\'autre personne') + ' a raccroché', 'orange');
    } else if (sig.type === 'reject') {
        _rtcHangup(true);
        notif('📵 Appel refusé', (_rtcCallOtherName || 'L\'autre personne') + ' a refusé l\'appel', 'orange');
    }
}

window._rtcAcceptCall = async function() {
    const sig = _rtcIncomingOffer;
    if (!sig) return;
    document.getElementById('rtc-incoming-overlay')?.remove();
    try {
        _rtcLocalStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    } catch(e) {
        notif('❌ Caméra/Micro refusé', 'Autorisez l\'accès dans votre navigateur', 'red'); return;
    }
    _rtcPeer = new RTCPeerConnection(_STUN);
    _rtcLocalStream.getTracks().forEach(t => _rtcPeer.addTrack(t, _rtcLocalStream));
    _rtcPeer.onicecandidate = e => { if (e.candidate) _rtcSendSignal(_rtcCallBookingId, _rtcCallOtherUserId, 'ice', { candidate: e.candidate }); };
    _rtcPeer.ontrack = e => {
        const v = document.getElementById('rtc-remote-video');
        if (v) { v.srcObject = e.streams[0]; document.getElementById('rtc-waiting-label')?.remove(); }
    };
    await _rtcPeer.setRemoteDescription(new RTCSessionDescription(sig.payload.sdp));
    const answer = await _rtcPeer.createAnswer();
    await _rtcPeer.setLocalDescription(answer);
    await _rtcSendSignal(_rtcCallBookingId, _rtcCallOtherUserId, 'answer', { sdp: answer });
    _rtcShowVideoUI(_rtcCallOtherName);
};

window._rtcRejectCall = function() {
    if (_rtcIncomingOffer) _rtcSendSignal(_rtcCallBookingId, _rtcIncomingOffer.from_user_id, 'reject', {});
    document.getElementById('rtc-incoming-overlay')?.remove();
    _rtcIncomingOffer = null;
};

function _rtcHangup(remote) {
    if (window._rtcCallTimerInterval) { clearInterval(window._rtcCallTimerInterval); window._rtcCallTimerInterval = null; }
    if (_rtcPeer) {
        if (!remote && _rtcCallBookingId && _rtcCallOtherUserId)
            _rtcSendSignal(_rtcCallBookingId, _rtcCallOtherUserId, 'hangup', {});
        try { _rtcPeer.close(); } catch(e){}
        _rtcPeer = null;
    }
    if (_rtcLocalStream) { _rtcLocalStream.getTracks().forEach(t => t.stop()); _rtcLocalStream = null; }
    document.getElementById('rtc-video-overlay')?.remove();
    document.getElementById('rtc-incoming-overlay')?.remove();
    document.getElementById('rtc-calling-overlay')?.remove();
    _rtcIncomingOffer = null;
}
window._rtcHangup = _rtcHangup;

};
window._rtcToggleCam = function(btn) {

async function _chatSendText(bookingId) {
    const input = document.getElementById('chat-input');
    const text = input?.value?.trim();
    if (!text) return;
    if (input._sending) return;
    input._sending = true;
    input.value = '';

    // Récupérer reply en cours
    const replyToId      = window._chatReplyToId || null;
    const replyToContent = window._chatReplyToContent || null;
    const replyToSender  = window._chatReplyToSender || null;
    _chatCancelReply();

    const tempId = 'local-' + Date.now() + '-' + Math.random().toString(36).substr(2,5);
    const msg = {
        id: tempId,
        booking_id: bookingId, sender_id: currentUser.id,
        sender_name: currentUser.name || 'Moi',
        content: sanitize(text), created_at: new Date().toISOString(),
        reply_to_id: replyToId, reply_to_content: replyToContent, reply_to_sender: replyToSender
    };
    _chatAppend(msg);
    if (!window._chatSentLocalIds) window._chatSentLocalIds = new Set();
    window._chatSentLocalIds.add(text.trim());
    try { sb.channel('chat-' + bookingId).send({ type:'broadcast', event:'new_message', payload: msg }); } catch(e){}
    // Stopper l'indicateur de frappe
    _chatSendTyping(bookingId, false);
    const { error } = await sb.from('messages').insert({
        booking_id: bookingId, sender_id: currentUser.id,
        sender_name: currentUser.name || 'Moi', content: sanitize(text),
        reply_to_id: replyToId, reply_to_content: replyToContent, reply_to_sender: replyToSender
    });
    if (error) notif('❌ Erreur envoi', error.message, 'red');
    input._sending = false;
    setTimeout(() => window._chatSentLocalIds?.delete(text.trim()), 5000);
}

function _chatPreviewImg(fileInput) {
    const file = fileInput?.files?.[0];
    if (!file) return;
    if (file.size > 20 * 1024 * 1024) { notif('❌ Image trop lourde', 'Max 20 Mo', 'red'); fileInput.value=''; return; }
    const reader = new FileReader();
    reader.onload = e => {
        const pz = document.getElementById('chat-img-preview');
        const pi = document.getElementById('chat-img-preview-img');
        const pn = document.getElementById('chat-img-preview-name');
        if (pz) pz.style.display = 'block';
        if (pi) pi.src = e.target.result;
        if (pn) pn.textContent = file.name + ' · ' + (file.size/1024).toFixed(0) + ' Ko';
        const inp = document.getElementById('chat-input');
        if (inp) inp.placeholder = 'Légende (optionnel)...';
    };
    reader.readAsDataURL(file);
}

function _chatCancelPreview() {
    const fi = document.getElementById('chat-img-input');
    if (fi) fi.value = '';
    const pz = document.getElementById('chat-img-preview');
    if (pz) pz.style.display = 'none';
    const inp = document.getElementById('chat-input');
    if (inp) inp.placeholder = 'Écrire un message...';
}

async function _chatSendImg(bookingId, fileInput) {
    const file = fileInput?.files?.[0];
    if (!file) { notif('❌ Aucune image', '', 'red'); return; }
    const btn = document.getElementById('chat-preview-send');
    if (btn) { btn.textContent = '⏳ Envoi...'; btn.disabled = true; }

    const caption = (document.getElementById('chat-input')?.value || '').trim();
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g,'');
    const path = bookingId + '/' + Date.now() + '_' + Math.random().toString(36).substr(2,6) + '.' + ext;

    // Créer un blob URL local pour affichage immédiat (pas de latence CDN)
    const localBlobUrl = URL.createObjectURL(file);

    // Afficher immédiatement avec l'image locale
    const content = caption || '📷 Photo';
    const localMsg = {
        booking_id: bookingId, sender_id: currentUser.id,
        sender_name: currentUser.name || 'Moi',
        content, image_url: localBlobUrl, created_at: new Date().toISOString()
    };
    _chatAppend(localMsg);
    _chatCancelPreview();
    if (document.getElementById('chat-input')) document.getElementById('chat-input').value = '';

    // Upload en arrière-plan
    const { error: upErr } = await sb.storage.from('chat-images').upload(path, file, { upsert:false, contentType:file.type });
    if (upErr) {
        notif('❌ Erreur upload', upErr.message, 'red');
        if (btn) { btn.textContent = '📤 Envoyer la photo'; btn.disabled = false; }
        return;
    }
    const { data: urlData } = sb.storage.from('chat-images').getPublicUrl(path);
    const imageUrl = urlData?.publicUrl;
    if (!imageUrl) { notif('❌ URL introuvable', '', 'red'); return; }

    // Envoyer le message avec l'URL permanente (pour l'autre personne)
    const remoteMsg = {
        booking_id: bookingId, sender_id: currentUser.id,
        sender_name: currentUser.name || 'Moi',
        content, image_url: imageUrl, created_at: new Date().toISOString()
    };
    try { sb.channel('chat-' + bookingId).send({ type:'broadcast', event:'new_message', payload: remoteMsg }); } catch(e){}
    await sb.from('messages').insert({
        booking_id: bookingId, sender_id: currentUser.id,
        sender_name: currentUser.name || 'Moi', content, image_url: imageUrl
    });
    notif('✅ Photo envoyée !', '', 'green');
}

async function _chatLoadMessages(bookingId) {
    const { data } = await sb.from('messages').select('*').eq('booking_id', bookingId).order('created_at', { ascending:true });
    const container = document.getElementById('chat-messages');
    if (!container) return;
    container.innerHTML = '';
    if (!data || data.length === 0) {
        const empty = document.createElement('p');
        empty.className = 'chat-empty';
        Object.assign(empty.style, { textAlign:'center', color:'#9CA3AF', fontSize:'14px', padding:'40px 20px', margin:'auto', lineHeight:'1.7' });
        empty.innerHTML = '💬 Aucun message<br><span style="font-size:12px;color:#D1D5DB">Commencez la conversation !</span>';
        container.appendChild(empty);
        return;
    }
    data.forEach(m => _chatAppend(m));
}

function _chatAppend(msg) {
    const container = document.getElementById('chat-messages');
    if (!container) return;
    container.querySelector('.chat-empty')?.remove();

    const isMe = msg.sender_id === currentUser.id;
    const time = new Date(msg.created_at).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit', timeZone: NC_TZ });

    const wrapper = document.createElement('div');
    wrapper.dataset.msgId = msg.id || '';
    wrapper.style.cssText = 'display:flex;flex-direction:column;' + (isMe ? 'align-items:flex-end' : 'align-items:flex-start') + ';position:relative';

    const bubbleWrap = document.createElement('div');
    bubbleWrap.style.maxWidth = '75%';

    const radMe = '18px 18px 4px 18px';
    const radOther = '18px 18px 18px 4px';
    const bgMe = 'linear-gradient(135deg,#3B82F6,#2563EB)';

    // ── Bloc reply cité ──
    if (msg.reply_to_id && msg.reply_to_content) {
        const replyRef = document.createElement('div');
        Object.assign(replyRef.style, {
            background: isMe ? 'rgba(255,255,255,0.18)' : '#F0F4FF',
            borderLeft: '3px solid ' + (isMe ? 'rgba(255,255,255,0.6)' : '#3B82F6'),
            borderRadius: '10px 10px 0 0',
            padding: '6px 10px',
            marginBottom: '-4px',
            cursor: 'pointer',
            maxWidth: '100%'
        });
        replyRef.innerHTML =
            '<p style="font-size:10px;font-weight:700;color:' + (isMe ? 'rgba(255,255,255,0.7)' : '#2563EB') + ';margin:0 0 2px">'
            + _esc(msg.reply_to_sender || 'Contact') + '</p>'
            + '<p style="font-size:11px;color:' + (isMe ? 'rgba(255,255,255,0.55)' : '#9CA3AF') + ';margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px">'
            + _esc(msg.reply_to_content) + '</p>';
        replyRef.addEventListener('click', () => {
            const target = document.querySelector('[data-msg-id="' + msg.reply_to_id + '"]');
            if (target) {
                target.scrollIntoView({ behavior:'smooth', block:'center' });
                target.style.transition = 'background .3s';
                target.style.background = 'rgba(59,130,246,0.12)';
                setTimeout(() => target.style.background = '', 1000);
            }
        });
        bubbleWrap.appendChild(replyRef);
    }

    if (msg.doc_url) {
        const docWrap = document.createElement('a');
        docWrap.href = msg.doc_url;
        docWrap.target = '_blank';
        docWrap.style.cssText = 'text-decoration:none;display:block';
        const docBubble = document.createElement('div');
        Object.assign(docBubble.style, {
            background: isMe ? bgMe : '#fff',
            borderRadius: isMe ? radMe : radOther,
            padding:'12px 14px',
            boxShadow: isMe ? '0 3px 14px rgba(59,130,246,0.35)' : '0 2px 8px rgba(0,0,0,0.1)',
            display:'flex', alignItems:'center', gap:'10px', minWidth:'180px', maxWidth:'240px'
        });
        const ext = (msg.doc_name||'').split('.').pop().toLowerCase();
        const icon = ext==='pdf'?'📕':ext==='doc'||ext==='docx'?'📘':ext==='xls'||ext==='xlsx'?'📗':ext==='ppt'||ext==='pptx'?'📙':'📄';
        docBubble.innerHTML =
            `<span style="font-size:26px;flex-shrink:0">${icon}</span>`
            +`<div style="min-width:0"><p style="font-size:12px;font-weight:700;color:${isMe?'#fff':'#111'};margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${_esc(msg.doc_name||'Document')}</p>`
            +`<p style="font-size:10px;color:${isMe?'rgba(255,255,255,0.6)':'#9CA3AF'};margin:3px 0 0">${(msg.doc_type||'').toUpperCase()} · Appuyer pour ouvrir</p></div>`;
        docWrap.appendChild(docBubble);
        bubbleWrap.appendChild(docWrap);
    } else if (msg.video_url) {
        const vidWrap = document.createElement('div');
        Object.assign(vidWrap.style, {
            background: isMe ? bgMe : '#fff',
            borderRadius: isMe ? radMe : radOther,
            padding:'6px',
            boxShadow: isMe ? '0 3px 14px rgba(59,130,246,0.35)' : '0 2px 8px rgba(0,0,0,0.1)',
            maxWidth:'240px'
        });
        const vid = document.createElement('video');
        vid.src = msg.video_url;
        vid.controls = true;
        vid.playsInline = true;
        vid.style.cssText = 'width:100%;border-radius:10px;display:block;max-height:200px;background:#000';
        if (msg.content && msg.content !== '🎬 Vidéo') {
            const cap = document.createElement('p');
            cap.textContent = msg.content;
            Object.assign(cap.style, { margin:'5px 6px 2px', fontSize:'13px', color: isMe ? '#fff' : '#111' });
            vidWrap.append(vid, cap);
        } else {
            vidWrap.appendChild(vid);
        }
        bubbleWrap.appendChild(vidWrap);
    } else if (msg.audio_url) {
        const audioWrap = document.createElement('div');
        Object.assign(audioWrap.style, {
            background: isMe ? bgMe : '#fff',
            borderRadius: isMe ? radMe : radOther,
            padding:'10px 12px',
            boxShadow: isMe ? '0 3px 14px rgba(59,130,246,0.35)' : '0 2px 8px rgba(0,0,0,0.1)',
            display:'flex', alignItems:'center', gap:'10px', minWidth:'200px'
        });
        const micIcon = document.createElement('span');
        micIcon.textContent = '🎤';
        micIcon.style.cssText = 'font-size:18px;flex-shrink:0';
        const audioEl = document.createElement('audio');
        audioEl.src = msg.audio_url;
        audioEl.controls = true;
        audioEl.style.cssText = 'flex:1;height:32px;min-width:0;border-radius:6px';
        audioWrap.append(micIcon, audioEl);
        bubbleWrap.appendChild(audioWrap);
    } else if (msg.image_url) {
        const imgWrap = document.createElement('div');
        Object.assign(imgWrap.style, {
            borderRadius: isMe ? radMe : radOther,
            overflow:'hidden',
            background: isMe ? bgMe : '#fff',
            boxShadow: isMe ? '0 3px 14px rgba(59,130,246,0.35)' : '0 2px 8px rgba(0,0,0,0.1)',
            padding:'5px'
        });
        const img = document.createElement('img');
        img.src = msg.image_url;
        img.alt = 'Photo';
        Object.assign(img.style, {
            display:'block', width:'100%', maxWidth:'220px', maxHeight:'220px',
            objectFit:'cover', borderRadius:'12px', cursor:'pointer'
        });
        img.addEventListener('click', () => _chatFullImg(msg.image_url));
        let retryCount = 0;
        img.addEventListener('error', () => {
            if (retryCount < 3) {
                retryCount++;
                setTimeout(() => { img.src = msg.image_url + (msg.image_url.includes('?') ? '&' : '?') + 'retry=' + retryCount; }, retryCount * 1500);
            } else {
                img.style.display = 'none';
                const fallback = document.createElement('p');
                fallback.textContent = '📷 Photo (chargement échoué)';
                fallback.style.cssText = 'color:#999;font-size:12px;padding:8px;text-align:center';
                imgWrap.appendChild(fallback);
            }
        });
        imgWrap.appendChild(img);
        if (msg.content && msg.content !== '📷 Photo') {
            const cap = document.createElement('p');
            cap.textContent = msg.content;
            Object.assign(cap.style, { margin:'5px 6px 2px', fontSize:'13px', color: isMe ? '#fff' : '#111' });
            imgWrap.appendChild(cap);
        }
        bubbleWrap.appendChild(imgWrap);
    } else {
        const bubble = document.createElement('div');
        Object.assign(bubble.style, {
            background: isMe ? bgMe : '#fff',
            color: isMe ? '#fff' : '#111',
            borderRadius: isMe ? radMe : radOther,
            padding:'10px 14px',
            boxShadow: isMe ? '0 3px 14px rgba(59,130,246,0.35)' : '0 2px 8px rgba(0,0,0,0.1)',
            wordBreak:'break-word', lineHeight:'1.5', fontSize:'14px'
        });
        bubble.textContent = msg.content || '';
        bubbleWrap.appendChild(bubble);
    }

    // ── Meta (heure + icône lu) ──
    const meta = document.createElement('div');
    meta.style.cssText = 'display:flex;align-items:center;gap:4px;margin:3px 2px 0;' + (isMe ? 'justify-content:flex-end' : '');
    const timeSpan = document.createElement('span');
    timeSpan.style.cssText = 'font-size:10px;color:#9CA3AF';
    timeSpan.textContent = (isMe ? 'Vous' : (msg.sender_name || 'Contact')) + ' · ' + time;
    meta.appendChild(timeSpan);
    if (isMe) {
        const readIcon = document.createElement('span');
        readIcon.dataset.readIcon = msg.id || '';
        readIcon.style.cssText = 'font-size:11px;transition:color .3s;color:' + (msg.read_at ? '#3B82F6' : '#D1D5DB');
        readIcon.textContent = msg.read_at ? '✓✓' : '✓';
        meta.appendChild(readIcon);
    }
    bubbleWrap.appendChild(meta);

    // ── Swipe droite ou double-clic = répondre ──
    let _tStartX = 0, _lpTimer = null;
    bubbleWrap.addEventListener('touchstart', e => {
        _tStartX = e.touches[0].clientX;
        _lpTimer = setTimeout(() => _chatSetReply(msg), 600);
    }, { passive:true });
    bubbleWrap.addEventListener('touchmove', e => {
        clearTimeout(_lpTimer);
        if (e.touches[0].clientX - _tStartX > 50) _chatSetReply(msg);
    }, { passive:true });
    bubbleWrap.addEventListener('touchend', () => clearTimeout(_lpTimer), { passive:true });
    bubbleWrap.addEventListener('dblclick', () => _chatSetReply(msg));

    wrapper.appendChild(bubbleWrap);

    // Marquer comme lu si message reçu

}

// ── VOCAL ──
let _mediaRecorder = null;
let _audioChunks   = [];
let _recTimerInterval = null;
let _recSeconds = 0;
let _audioBlobReady = null;

function _chatToggleRecording(bookingId) {
    if (_mediaRecorder && _mediaRecorder.state === 'recording') {
        _chatStopRecording(false);
    } else {
        _chatStartRecording(bookingId);
    }
}

async function _chatStartRecording() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        notif('❌ Micro non supporté', 'Votre navigateur ne supporte pas l\'enregistrement audio', 'red');
        return;
    }
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        _audioChunks = [];
        _audioBlobReady = null;

        const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
            ? 'audio/webm;codecs=opus'
            : MediaRecorder.isTypeSupported('audio/webm')
            ? 'audio/webm'
            : 'audio/ogg';
        _mediaRecorder = new MediaRecorder(stream, { mimeType });

        _mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) _audioChunks.push(e.data); };
        _mediaRecorder.onstop = () => {
            stream.getTracks().forEach(t => t.stop());
            const blob = new Blob(_audioChunks, { type: _mediaRecorder.mimeType });
            _audioBlobReady = blob;
            // Masquer zone rec, montrer preview
            const recZone = document.getElementById('chat-rec-zone');
            const previewZone = document.getElementById('chat-audio-preview');
            const micBtn = document.getElementById('chat-mic-btn');
            if (recZone) recZone.style.display = 'none';
            if (micBtn) {
                micBtn.style.background = '#F3F4F6';
                micBtn.style.borderColor = '#E5E7EB';
                micBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="9" y1="22" x2="15" y2="22"/></svg>';
            }
            if (previewZone && _recSeconds > 0) {
                const player = document.getElementById('chat-audio-preview-player');
                if (player) player.src = URL.createObjectURL(blob);
                previewZone.style.display = 'block';
            }
            clearInterval(_recTimerInterval);
            _recSeconds = 0;
        };

        _mediaRecorder.start(200);

        // UI
        const recZone = document.getElementById('chat-rec-zone');
        const micBtn = document.getElementById('chat-mic-btn');
        if (recZone) recZone.style.display = 'flex';
        if (micBtn) {
            micBtn.style.background = '#FEE2E2';
            micBtn.style.borderColor = '#FCA5A5';
            micBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="#EF4444" stroke="none"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0" fill="none" stroke="#EF4444" stroke-width="2"/><line x1="12" y1="19" x2="12" y2="22" stroke="#EF4444" stroke-width="2"/><line x1="9" y1="22" x2="15" y2="22" stroke="#EF4444" stroke-width="2"/></svg>';
        }

        // Timer
        _recSeconds = 0;
        _recTimerInterval = setInterval(() => {
            _recSeconds++;
            const timerEl = document.getElementById('chat-rec-timer');
            const m = Math.floor(_recSeconds / 60);
            const s = _recSeconds % 60;
            if (timerEl) timerEl.textContent = m + ':' + String(s).padStart(2,'0');
            // Limite 2 min
            if (_recSeconds >= 120) _chatStopRecording(false);
        }, 1000);

    } catch(e) {
        notif('❌ Accès micro refusé', 'Autorisez l\'accès au microphone dans votre navigateur', 'red');
    }
}

function _chatStopRecording(cancel) {
    clearInterval(_recTimerInterval);
    if (_mediaRecorder && _mediaRecorder.state !== 'inactive') {
        if (cancel) {
            // Annuler : stopper sans preview
            _mediaRecorder.onstop = () => {
                _mediaRecorder.stream?.getTracks().forEach(t => t.stop());
                _audioBlobReady = null;
                _audioChunks = [];
            };
            _mediaRecorder.stop();
            const recZone = document.getElementById('chat-rec-zone');
            const micBtn = document.getElementById('chat-mic-btn');
            if (recZone) recZone.style.display = 'none';
            if (micBtn) {
                micBtn.style.background = '#F3F4F6';
                micBtn.style.borderColor = '#E5E7EB';
                micBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="9" y1="22" x2="15" y2="22"/></svg>';
            }
            _recSeconds = 0;
        } else {
            _mediaRecorder.stop(); // onstop above handles UI
        }
    }
}

function _chatCancelAudioPreview() {
    _audioBlobReady = null;
    const pz = document.getElementById('chat-audio-preview');
    if (pz) pz.style.display = 'none';
    const player = document.getElementById('chat-audio-preview-player');
    if (player) { player.pause(); player.src = ''; }

async function _chatSendAudio(bookingId) {
    if (!_audioBlobReady) { notif('❌ Aucun enregistrement', '', 'red'); return; }
    const blob = _audioBlobReady;
    const btn = document.getElementById('chat-audio-preview-send');
    if (btn) { btn.textContent = '⏳ Envoi...'; btn.disabled = true; }

    // Déterminer extension
    const ext = blob.type.includes('ogg') ? 'ogg' : 'webm';
    const path = bookingId + '/vocal_' + Date.now() + '_' + Math.random().toString(36).substr(2,5) + '.' + ext;

    // Afficher localement immédiatement
    const localUrl = URL.createObjectURL(blob);
    _chatAppend({
        booking_id: bookingId,
        sender_id: currentUser.id,
        sender_name: currentUser.name || 'Moi',
        content: '🎤 Vocal',
        audio_url: localUrl,
        created_at: new Date().toISOString()
    });
    _chatCancelAudioPreview();

    // Upload Supabase
    const { error: upErr } = await sb.storage.from('chat-audio').upload(path, blob, { upsert: false, contentType: blob.type });
    if (upErr) {
        notif('❌ Erreur upload', upErr.message, 'red');
        if (btn) { btn.textContent = '📤 Envoyer'; btn.disabled = false; }
        return;
    }
    const { data: urlData } = sb.storage.from('chat-audio').getPublicUrl(path);
    const audioUrl = urlData?.publicUrl;
    if (!audioUrl) { notif('❌ URL introuvable', '', 'red'); return; }

    const remoteMsg = {
        booking_id: bookingId, sender_id: currentUser.id,
        sender_name: currentUser.name || 'Moi',
        content: '🎤 Vocal', audio_url: audioUrl,
        created_at: new Date().toISOString()
    };
    try { sb.channel('chat-' + bookingId).send({ type: 'broadcast', event: 'new_message', payload: remoteMsg }); } catch(e){}
    await sb.from('messages').insert({
        booking_id: bookingId, sender_id: currentUser.id,
        sender_name: currentUser.name || 'Moi',
        content: '🎤 Vocal', audio_url: audioUrl
    });
    notif('✅ Vocal envoyé !', '', 'green');
    _audioBlobReady = null;
}

    const coverUrl = urlData.publicUrl + '?t=' + Date.now();

    await sb.from('instructors').update({ cover_url: coverUrl }).eq('id', currentUser.id);
    const idx = DB.instructors.findIndex(i => i.id === currentUser.id);
    if (idx >= 0) DB.instructors[idx].cover_url = coverUrl;

    notif('✅ Photo de couverture mise à jour !', 'Visible sur votre profil public', 'green');
};

window._deleteCoverPhoto = async function() {
    if (!confirm('Supprimer la photo de couverture ?')) return;
    await sb.from('instructors').update({ cover_url: null }).eq('id', currentUser.id);
    const idx = DB.instructors.findIndex(i => i.id === currentUser.id);
    if (idx >= 0) delete DB.instructors[idx].cover_url;
    notif('✅ Photo supprimée', '', 'green');
    render();
};

// ========== PROFIL PUBLIC MONITEUR ==========
window.focusInstructor = function(id) { window.showInstructorProfile(id); };

window.showInstructorProfile = async function(instructorId) {
    const inst = DB.instructors.find(x => x.id === instructorId);
    if (!inst) return;
    const slots = DB.slots.filter(s => s.instructor_id === instructorId && s.available);
    const stars = inst.rating ? Math.round(inst.rating) : 0;

    document.getElementById('profile-modal')?.remove();

    const overlay = document.createElement('div');
    overlay.id = 'profile-modal';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center';
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

    const panel = document.createElement('div');
    panel.style.cssText = 'width:100%;max-width:520px;border-radius:28px 28px 0 0;overflow:hidden;max-height:92vh;overflow-y:auto;background:var(--surface)';
    panel.innerHTML = '<div style="text-align:center;padding:40px;color:var(--db-text2)"><p style="font-size:32px">⏳</p><p>Chargement...</p></div>';
    overlay.appendChild(panel);
    document.body.appendChild(overlay);

    // Charger les avis ET les stats de réservations publiques
    let reviews = [];
    let pubStats = { total: 0, completed: 0, hours: 0, students: 0 };
    try {
        const [revRes, statsRes] = await Promise.all([
            sb.from('bookings')
                .select('id,student_name,rating,rating_comment,rated_at,date')
                .eq('instructor_id', instructorId)
                .not('rating', 'is', null)
                .order('rated_at', { ascending: false })
                .limit(10),
            sb.from('bookings')
                .select('id,student_id,status,duration')
                .eq('instructor_id', instructorId)
                .in('status', ['confirmed', 'completed'])
        ]);
        reviews = revRes.data || [];
        const statsData = statsRes.data || [];
        pubStats.total     = statsData.length;
        pubStats.completed = statsData.filter(b => b.status === 'completed').length;
        pubStats.hours     = statsData.reduce((s, b) => s + (parseFloat(b.duration) || 1), 0);
        pubStats.students  = new Set(statsData.map(b => b.student_id)).size;
    } catch(e) {}

    const specialties = [];
    if (inst.is_aac) specialties.push('🚗 AAC');
    if (inst.is_refresh) specialties.push('🔄 Remise à niveau');
    if (!inst.license_types || inst.license_types.includes('B')) specialties.push('🚗 Permis B');
    if (inst.license_types?.includes('A')) specialties.push('🏍️ Permis A');
    if (inst.license_types?.includes('AT')) specialties.push('🛵 Permis AT');

    const starDist = [5,4,3,2,1].map(s => ({
        stars: s,
        count: reviews.filter(r=>Math.round(r.rating)===s).length
    }));

    panel.innerHTML = `
    ${inst.cover_url ? `
    <div style="height:160px;background:url('${inst.cover_url}') center/cover no-repeat;position:relative;flex-shrink:0">
        <div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(13,13,13,0.85) 100%)"></div>
    </div>` : ''}
    <div style="background:linear-gradient(160deg,#0D0D0D 0%,#1A1A1A 100%);padding:${inst.cover_url?'16px':'28px'} 24px 24px;position:relative">
        <button onclick="document.getElementById('profile-modal').remove()" style="position:absolute;top:18px;right:18px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.6);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center">✕</button>
        <div style="display:flex;align-items:flex-start;gap:18px;margin-bottom:20px">
            <div style="position:relative;flex-shrink:0">
                <div style="width:80px;height:80px;border-radius:20px;overflow:hidden;background:#FF5A1F;border:2px solid ${inst.is_driving?'#FBBF24':inst.is_online?'#22C55E':'#333'}">
                    <img src="${inst.avatar_url||DEFAULT_AVATAR}" style="width:100%;height:100%;object-fit:cover">
                </div>
                <div style="position:absolute;bottom:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:${inst.is_driving?'#FBBF24':inst.is_online?'#22C55E':'#555'};border:2px solid #0D0D0D"></div>
            </div>
            <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
                    <h2 style="font-size:21px;font-weight:900;color:#fff;margin:0">${_esc(inst.name||'')}</h2>
                    ${inst.verified?'<span style="background:rgba(34,197,94,0.15);color:#4ADE80;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700">✓ Vérifié</span>':''}
                </div>
                <p style="color:rgba(255,255,255,0.45);font-size:13px;margin:0 0 8px">📍 ${_esc(inst.location||'Nouméa')}</p>
                <div style="display:flex;align-items:center;gap:6px">
                    <span style="color:#F59E0B;font-size:15px">${'★'.repeat(stars) + '☆'.repeat(5-stars)}</span>
                    <span style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:700">${inst.rating?inst.rating.toFixed(1):'—'}</span>
                    <span style="color:rgba(255,255,255,0.3);font-size:12px">(${inst.total_reviews||reviews.length||0} avis)</span>
                </div>
                <p style="font-size:12px;color:${inst.is_driving?'#FBBF24':inst.is_online?'#4ADE80':'#6B7280'};margin:6px 0 0;font-weight:700">
                    ${inst.is_driving?'🚗 En cours de conduite':inst.is_online?'🟢 En ligne maintenant':'⚫ Hors ligne'}
                </p>
            </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:1px;background:rgba(255,255,255,0.08);border-radius:16px;overflow:hidden">
            ${[
                { val:(inst.hourly_rate||0).toLocaleString(), sub:'XPF/h', color:'#FF5A1F' },
                { val:inst.experience||'—', sub:'ans exp.', color:'#fff' },
                { val:slots.length, sub:'créneaux', color:'#fff' },
                { val:inst.total_reviews||reviews.length||0, sub:'avis', color:'#F59E0B' },
            ].map(s=>`<div style="background:rgba(255,255,255,0.04);padding:14px 8px;text-align:center">
                <p style="font-size:18px;font-weight:900;color:${s.color};margin:0">${s.val}</p>
                <p style="font-size:10px;color:rgba(255,255,255,0.3);margin:3px 0 0">${s.sub}</p>
            </div>`).join('')}
        </div>
    </div>

    ${inst.bio ? `<div style="padding:16px 20px;border-bottom:1px solid var(--border)">
        <p style="font-size:14px;color:var(--db-text);line-height:1.6;margin:0">${_esc(inst.bio)}</p>
    </div>` : ''}

    <!-- Stats publiques -->
    <div style="padding:16px 20px;border-bottom:1px solid var(--border)">
        <p style="font-size:11px;font-weight:700;color:var(--db-text3);letter-spacing:1.5px;margin:0 0 12px">STATISTIQUES</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            ${[
                { val: pubStats.completed, label: 'Cours validés', icon: '✅', color: '#22C55E' },
                { val: pubStats.students,  label: 'Élèves formés',  icon: '👨‍🎓', color: '#3B82F6' },
                { val: Math.round(pubStats.hours), label: 'Heures enseignées', icon: '⏱', color: '#FF5A1F' },
                { val: pubStats.completed > 0 ? Math.round(pubStats.completed / Math.max(pubStats.total, 1) * 100) + '%' : '—', label: 'Taux de complétion', icon: '📈', color: '#8B5CF6' },
            ].map(s => `<div style="background:var(--db-bg3);border-radius:14px;padding:14px;border:1px solid var(--db-border)">
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
                    <span style="font-size:14px">${s.icon}</span>
                    <p style="font-size:10px;color:var(--db-text3);font-weight:700;letter-spacing:0.5px;margin:0">${s.label.toUpperCase()}</p>
                </div>
                <p style="font-size:22px;font-weight:900;color:${s.color};margin:0">${s.val}</p>
            </div>`).join('')}
        </div>
    </div>

    <!-- Bouton Partager -->
    <div style="padding:12px 20px;border-bottom:1px solid var(--border);display:flex;gap:8px">
        <button onclick="(async()=>{
            const link='${window?.location?.origin||''}${window?.location?.pathname||''}?instructor=${instructorId}';
            if(navigator.share){await navigator.share({title:'${_esc(inst.name||'')} — DriveConnect NC',text:'Réservez un cours avec ${_esc(inst.name||'')} sur DriveConnect NC',url:link});}
            else{await navigator.clipboard.writeText(link);window._notifProxy&&window._notifProxy('✅ Lien copié !','Partagez ce lien avec vos proches','green');}
        })()" style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 16px;background:var(--db-bg3);border:1px solid var(--db-border);border-radius:14px;color:var(--db-text);font-weight:700;font-size:13px;cursor:pointer">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Partager ce profil
        </button>
        <button onclick="window.open('geo:${inst.lat||NOUMEA.lat},${inst.lng||NOUMEA.lng}?q=${inst.lat||NOUMEA.lat},${inst.lng||NOUMEA.lng}(${encodeURIComponent(inst.name||'Moniteur')})','_blank')" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 16px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:14px;color:#3B82F6;font-weight:700;font-size:13px;cursor:pointer">
            🗺️ Y aller
        </button>
    </div>

    ${specialties.length ? `<div style="padding:14px 20px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px">
        ${specialties.map(s=>`<span style="background:var(--db-bg3);color:var(--db-text2);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;border:1px solid var(--db-border)">${s}</span>`).join('')}
    </div>` : ''}

    ${reviews.length > 0 ? `<div style="padding:20px;border-bottom:1px solid var(--border)">
        <p style="font-weight:800;font-size:15px;color:var(--db-text);margin:0 0 14px">⭐ Évaluations</p>
        <div style="display:flex;gap:16px;align-items:center;margin-bottom:16px">
            <div style="text-align:center;flex-shrink:0">
                <p style="font-size:40px;font-weight:900;color:var(--db-text);margin:0;line-height:1">${inst.rating?inst.rating.toFixed(1):'—'}</p>
                <p style="font-size:12px;color:var(--db-text2);margin:4px 0 0">${reviews.length} avis</p>
            </div>
            <div style="flex:1">
                ${starDist.map(s=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                    <span style="font-size:11px;color:var(--db-text2);width:10px;text-align:right">${s.stars}</span>
                    <span style="color:#F59E0B;font-size:10px">★</span>
                    <div style="flex:1;background:var(--db-bg4);border-radius:4px;height:6px">
                        <div style="background:#F59E0B;height:6px;border-radius:4px;width:${reviews.length>0?Math.round(s.count/reviews.length*100):0}%"></div>
                    </div>
                    <span style="font-size:10px;color:var(--db-text3);width:14px">${s.count}</span>
                </div>`).join('')}
            </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;max-height:200px;overflow-y:auto">
            ${reviews.filter(r=>r.rating_comment).slice(0,5).map(r=>`
            <div style="background:var(--db-bg3);border-radius:14px;padding:12px 14px;border:1px solid var(--db-border)">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
                    <p style="font-weight:700;font-size:13px;color:var(--db-text);margin:0">${_esc(r.student_name||'Élève')}</p>
                    <div style="display:flex;align-items:center;gap:4px">
                        <span style="color:#F59E0B;font-size:11px">${'★'.repeat(Math.round(r.rating||0))}</span>
                        <span style="font-size:10px;color:var(--db-text3)">${r.rated_at?new Date(r.rated_at).toLocaleDateString('fr-FR',{month:'short',year:'numeric',timeZone:NC_TZ}):''}</span>
                    </div>
                </div>
                <p style="font-size:13px;color:var(--db-text2);margin:0;line-height:1.5">${_esc(r.rating_comment)}</p>
            </div>`).join('')}
            ${reviews.filter(r=>!r.rating_comment).length>0&&reviews.filter(r=>r.rating_comment).length===0?'<p style="text-align:center;color:var(--db-text3);font-size:13px;padding:8px">Aucun commentaire écrit</p>':''}
        </div>
    </div>` : `<div style="padding:16px 20px;text-align:center;border-bottom:1px solid var(--border)">
        <p style="color:var(--db-text3);font-size:13px">Aucun avis pour le moment</p>
    </div>`}

    <div style="padding:20px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
            <p style="font-weight:800;font-size:15px;color:var(--db-text);margin:0">📅 Créneaux disponibles</p>
            <span style="background:var(--db-bg3);color:var(--db-text2);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700">${slots.length}</span>
        </div>
        ${slots.length===0
            ?`<div style="text-align:center;padding:28px;background:var(--db-bg3);border-radius:18px;border:1px solid var(--db-border)">
                <p style="font-size:32px;margin:0 0 8px">📅</p>
                <p style="font-weight:700;color:var(--db-text);margin:0">Aucun créneau disponible</p>
                <p style="font-size:13px;color:var(--db-text2);margin:4px 0 0">Revenez plus tard</p>
               </div>`
            :slots.map(s=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-radius:16px;margin-bottom:8px;background:var(--db-bg3);border:1px solid var(--db-border)">
                <div>
                    <p style="font-weight:700;font-size:14px;color:var(--db-text);margin:0">${s.date} à ${s.time}</p>
                    <p style="font-size:12px;color:var(--db-text2);margin:3px 0 0">⏱ ${s.duration}h ${s.license_type?'· Permis '+s.license_type:''}</p>
                </div>
                <div style="display:flex;align-items:center;gap:10px">
                    <p style="font-weight:800;color:#FF5A1F;font-size:14px;margin:0">${s.price.toLocaleString()} XPF</p>
                    <button onclick="document.getElementById('profile-modal').remove();window.bookSlot('${s.id}','${instructorId}')" style="background:linear-gradient(135deg,#FF5A1F,#FF7340);color:#fff;border:none;border-radius:12px;padding:9px 16px;font-weight:800;font-size:13px;cursor:pointer">Réserver</button>
                </div>
            </div>`).join('')}
    </div>`;
}


// ========== SKELETON LOADERS ==========
function showSkeleton() {
    let sk = document.getElementById('skeleton-overlay');
    if (!sk) {
        sk = document.createElement('div');
        sk.id = 'skeleton-overlay';
        sk.innerHTML = `
        <!-- Hero skeleton -->
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px">
            <div>
                <div class="sk" style="width:80px;height:12px;margin-bottom:10px"></div>
                <div class="sk" style="width:160px;height:28px;margin-bottom:8px"></div>
                <div class="sk" style="width:120px;height:12px"></div>
            </div>
            <div class="sk" style="width:44px;height:44px;border-radius:50%"></div>
        </div>
        <!-- Stats pills -->
        <div style="display:flex;gap:10px;margin-bottom:28px">
            <div class="sk" style="flex:1;height:72px;border-radius:16px"></div>
            <div class="sk" style="flex:1;height:72px;border-radius:16px"></div>
            <div class="sk" style="flex:1;height:72px;border-radius:16px"></div>
        </div>
        <!-- Card skeleton -->
        <div class="sk" style="width:120px;height:12px;margin-bottom:12px"></div>
        <div class="sk" style="width:100%;height:200px;border-radius:20px;margin-bottom:20px"></div>
        <!-- Actions rapides -->
        <div class="sk" style="width:120px;height:12px;margin-bottom:12px"></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px">
            <div class="sk" style="height:90px;border-radius:16px"></div>
            <div class="sk" style="height:90px;border-radius:16px"></div>
            <div class="sk" style="height:90px;border-radius:16px"></div>
        </div>
        <!-- List items -->
        <div class="sk" style="width:140px;height:12px;margin-bottom:12px"></div>
        <div style="display:flex;flex-direction:column;gap:10px">
            <div class="sk" style="width:100%;height:72px;border-radius:18px"></div>
            <div class="sk" style="width:100%;height:72px;border-radius:18px"></div>
            <div class="sk" style="width:100%;height:72px;border-radius:18px;opacity:.6"></div>
        </div>`;
        document.body.appendChild(sk);
    }
    sk.style.display = 'flex';
}

function hideSkeleton() {
    const sk = document.getElementById('skeleton-overlay');
    if (sk) {
        sk.style.transition = 'opacity .25s ease';
        sk.style.opacity = '0';
        setTimeout(() => { sk.style.display = 'none'; sk.style.opacity = '1'; }, 260);
    }
}

boot();
</script>
